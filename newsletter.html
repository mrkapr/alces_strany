<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Mimořádnosti | alces, a. s.</title>
<link rel="icon" href="favicon.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Google font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', Arial, sans-serif;

    background-image:
        linear-gradient(rgba(0,0,0,0.42), rgba(0,0,0,0.62)),
        url("fotky/gradient.png"),
        url("fotky/foto5.png");

    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    background-attachment: fixed;

    color: white;

    min-height: 100vh;
}

.topbar {
    height: 58px;

    position: fixed;
    top: 16px;
    left: 24px;
    right: 24px;
    z-index: 999;

    overflow: hidden;

    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.18);

    color: white;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 18px;

    border-radius: 24px;

    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);

    box-shadow:
        0 18px 55px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.18);
}

.topbar::after {
    content: "";
    position: absolute;

    width: 90px;
    height: 90px;

    left: var(--mouse-x, 50%);
    top: var(--mouse-y, 50%);

    transform: translate(-50%, -50%);

    background: radial-gradient(
        circle,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.10) 30%,
        transparent 68%
    );

    pointer-events: none;
    opacity: 0;
    filter: blur(8px);

    transition:
        opacity 0.25s ease,
        left 0.002s linear,
        top 0.002s linear;
}

.topbar:hover::after {
    opacity: 1;
}

.logo {
    display: flex;
    align-items: center;
}

.logo img {
    height: 34px;
    width: auto;
    display: block;
}

.menu {
    display: flex;
    align-items: center;
    gap: 25px;
}

.menu a {
    color: white;
    text-decoration: none;
    font-weight: 600;

    display: inline-block;

    transition: 
        transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1),
        opacity 0.25s ease;
}

.menu:hover a {
    opacity: 0.45;
    transform: scale(0.92);
}

.menu a:hover {
    opacity: 1 !important;
    transform: scale(1.06);
}

.menu a:active {
    transform: scale(0.9);
}

/* ===== obsah ===== */
.page {
    padding: 120px 40px 40px 40px;
    max-width: 1000px;
    margin: auto;
}

h1 {
    font-size: 42px;
    margin-bottom: 10px;

    text-shadow: 0 6px 30px rgba(0,0,0,0.35);
}

h2 {
    font-size: 18px;
    font-weight: 400;

    color: rgba(255,255,255,0.72);

    margin-bottom: 34px;
}

/* ===== příspěvky ===== */
.posts {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.post {
    background: rgba(255,255,255,0.08);

    border: 1px solid rgba(255,255,255,0.16);

    border-radius: 26px;

    padding: 22px 24px;

    text-decoration: none;
    color: white;

    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);

    box-shadow:
        0 18px 40px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.12);

    transition:
        transform 0.22s ease,
        background 0.22s ease,
        border 0.22s ease;
}

.post:hover {
    transform: translateY(-4px) scale(1.01);

    background: rgba(255,255,255,0.10);

    border: 1px solid rgba(255,255,255,0.22);
}

.post-title {
    font-size: 20px;
    font-weight: 600;
}

.post-meta {
    font-size: 14px;
    color: rgba(255,255,255,0.62);
    margin-top: 4px;
}

.login-btn {
    background: darkgreen;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Poppins', Arial, sans-serif;
}

.divider {
    height: 20px;
    width: 2.5px;
    background: white;
    border-radius: 3px;
}

.logout {
    margin-left: 20px;

    background: rgba(212, 0, 0, 0.55);
    color: white;

    border: 1px solid rgba(255,255,255,0.18);

    padding: 7px 14px;

    cursor: pointer;

    border-radius: 999px;

    font-family: 'Poppins', Arial, sans-serif;

    backdrop-filter: blur(12px);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.16),
        0 8px 24px rgba(0,0,0,0.18);

    transition: 
        transform 0.18s ease,
        background 0.18s ease;
}

.logout:hover {
    transform: scale(0.94);
    background: rgba(190,0,0,0.7);
}

.logout:active {
    transform: scale(0.88);
}

@media (max-width: 768px) {

    /* horní lišta */
    .topbar {
    top: 10px;
    left: 10px;
    right: 10px;

    border-radius: 22px;
}

    .logo img {
        height: 26px;
        margin-top: 0;
    }

    .menu {
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
    }

    .menu a {
        font-size: 14px;
    }

    .divider {
        display: none; /* na mobilu zbytečné */
    }

    .login-btn,
    .logout {
        padding: 6px 12px;
        font-size: 14px;
        margin-left: 0;
    }

    /* obsah */
    .page {
    padding-top: 110px;
}

    h1 {
        font-size: 26px;
    }

    h2 {
        font-size: 16px;
        margin-bottom: 20px;
    }

    /* příspěvky */
    .post {
        padding: 14px 16px;
    }

    .post-title {
        font-size: 18px;
    }

    .post-meta {
        font-size: 13px;
    }
}

</style>
</head>

<body>

<!-- horní lišta -->
<div class="topbar">

    <div class="logo">
        <a href="home.html">
            <img src="logo.png" alt="alces">
        </a>
    </div>


    <div class="menu">
        <a href="https://docs.google.com/document/d/12wPYNcB0jMdGctoVTnKWPKA1ezRAuSWsdNNbrYMAcl8/edit?usp=sharing">Pravidla</a>
        <span class="divider"></span>
        <a href="vedeni.html">Vedení</a>
        <a href="newsletter.html">Newsletter</a>
        <span class="divider"></span>
        <a href="https://docs.google.com/spreadsheets/d/1xZmap2ZlNtdJbJSCNzSDvAL-X3jTe1v1njc1bbja7H4/edit?gid=2043752783#gid=2043752783">Vozidla + výpravy</a>
        <a href="https://docs.google.com/spreadsheets/d/1g09QR10bl0h3smFniVOR513EZskczfaHee-k-azh3ck/edit?gid=1297485211#gid=1297485211">Výkazy (MZVŘ)</a>        
        <a href="https://drive.google.com/drive/folders/1hOn5_ZfKc7wz-s0B9qT6YBs3buMZAKVT?usp=sharing">Repainty</a>
        <span class="divider"></span>
        <button class="logout" onclick="logout()">Odhlásit se</button>
    </div>
</div>

<!-- obsah -->
<div class="page">
    <h1>Mimořádnosti</h1>
    <h2>Přehled všech mimořádností</h2>

    <div class="posts">

        <a href="post-1.html" class="post">
            <div class="post-title">Linka X438</div>
            <div class="post-meta">Přidal: Karel P. M. • 21. 1. 2026</div>
        </a>

    </div>
</div>
<script>
    const username = localStorage.getItem("username");

    if (!username) {
        // když někdo otevře home.html bez loginu
        window.location.href = "login.html";
    } else {
        document.getElementById("name").innerText = username;
    }

    function logout() {
        localStorage.removeItem("username");
        window.location.href = "index.html";
    }

    const topbar = document.querySelector(".topbar");

topbar.addEventListener("mousemove", (e) => {

    const rect = topbar.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    topbar.style.setProperty("--mouse-x", `${x}px`);
    topbar.style.setProperty("--mouse-y", `${y}px`);
});
</script>
</body>
</html>
