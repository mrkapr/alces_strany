        @media (max-width: 1000px) { .layout-grid { grid-template-columns: 1fr; } }
        .panel {

            box-shadow: 0 15px 35px rgba(0,0,0,0.2);

        .panel h2 { margin-top: 0; font-size: 20px; color: #ffd84d; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 14px; font-weight: 600; opacity: 0.9; }
        input, select, textarea {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
            color: white; padding: 12px; font-family: 'Poppins', sans-serif; font-size: 14px; box-sizing: border-box;
        }
        textarea { resize: vertical; min-height: 100px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #ffd84d; }

        .absence-table th { padding: 12px 8px; color: #ffd84d; border-bottom: 2px solid rgba(255,255,255,0.15); text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        .absence-table td { padding: 14px 8px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .sidebar-right {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100vh;
            background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-left: 1px solid rgba(255, 255, 255, 0.1); padding: 24px 16px; box-sizing: border-box;
            z-index: 99999; transition: right 0.3s ease-in-out;
        }
        .sidebar-right.open { right: 0; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.6); z-index: 99998; }
        .sidebar-overlay.open { display: block; }
            .logo {
    display: flex;
    align-items: center;
    }

.logo img {
    height: 34px;
    width: auto;
    display: block;
}
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">
        <a href="home.html">
        <img src="fotky/univ/logo.png" alt="alces">
        </a>
    </div>
    <div>
        <a href="home.html">Domů</a>
    </div>
</div>

<div id="rightSidebar" class="sidebar-right">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
        <span style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #ffd84d; font-weight: 700;">Správa firmy</span>
    </div>
    <a href="absence-sprava.html" style="display:block; color:white; text-decoration:none; padding:12px; border-radius:8px; margin-bottom:5px;">📅 Schvalování omluvenek</a>
</div>

<div class="content">
    <h1>Žádost o omluvenku / pauzu</h1>
    
    <div class="layout-grid">
        <div class="panel">
            <h2>Nová žádost</h2>
            <form id="absenceForm">
                <div class="form-group">
    <label>Typ žádosti</label>
    <select id="absenceType" required onchange="handleTypeChange()">
        <option value="Omluvenka">Omluvenka (pouze aktuální měsíc)</option>
        <option value="Pauza">Pauza (dlouhodobá, max 6 měsíců)</option>
    </select>
</div>
<div class="form-group">
    <label id="labelFrom">Od měsíce</label>
    <input type="month" id="absenceFrom" required>
</div>
<div class="form-group" id="groupTo">
    <label>Do měsíce (včetně)</label>
    <input type="month" id="absenceTo" required>
</div>
                <div class="form-group">
                    <label>Důvod / Poznámka</label>
                    <textarea id="absenceReason" placeholder="Zde rozepiš podrobnosti..." required></textarea>
                </div>
                <button type="submit" class="btn-add">Odeslat žádost</button>
            </form>
        </div>

        <div class="panel">
            <h2>Moje odeslané žádosti</h2>
            <table class="absence-table">
                <thead>
                    <tr>
                        <th>Typ</th>
                        <th>Termín</th>
                        <th>Poznámka</th>
                        <th>Stav žádosti</th>
                    </tr>
                </thead>
                <tbody id="myAbsenceList">
                    <tr>
                        <td colspan="4" style="opacity: 0.5; padding: 20px; text-align: center;">Načítám z databáze...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// 🚀 DYNAMICKÉ UZAMČENÍ MĚSÍCŮ
function handleTypeChange() {
    const type = document.getElementById("absenceType").value;
    const inputFrom = document.getElementById("absenceFrom");
    const inputTo = document.getElementById("absenceTo");
    const groupTo = document.getElementById("groupTo");
    const labelFrom = document.getElementById("labelFrom");

    // Zjistíme aktuální rok a měsíc (např. 2026-06)
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = String(now.getMonth() + 1).padStart(2, '0');
    const currentMonthString = `${currentYear}-${currentMonth}`;

    if (type === "Omluvenka") {
        // Skryjeme políčko "Do měsíce"
        groupTo.style.display = "none";
        inputTo.removeAttribute("required");
        labelFrom.innerText = "Vyber aktuální měsíc";
        
        // Vynutíme POUZE aktuální měsíc – min i max nastavíme na stejnou hodnotu
        inputFrom.value = currentMonthString;
        inputFrom.min = currentMonthString;
        inputFrom.max = currentMonthString;
    } else {
        // Pro Pauzu ukážeme obě pole a uvolníme limity pro budoucnost
        groupTo.style.display = "flex";
        inputTo.setAttribute("required", "true");
        labelFrom.innerText = "Od měsíce";
        
        inputFrom.value = "";
        inputFrom.removeAttribute("min");
        inputFrom.removeAttribute("max");
    }
}

window.addEventListener("DOMContentLoaded", handleTypeChange);
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAwRV2OuIhA-oyg295gIv5-4zfzO4qb9MY",
    authDomain: "alces-d505c.firebaseapp.com",
    projectId: "alces-d505c",
    storageBucket: "alces-d505c.firebasestorage.app",
    messagingSenderId: "318520073072",
    appId: "1:318520073072:web:53ab5c0033f60e96bbcdb5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userEmail = "";

onAuthStateChanged(auth, async (user) => {
    if (user) {
        userEmail = user.email;
        await loadMyAbsences();

        const allowedManagementRanks = ["team-manager", "dispecer", "provozni-reditel", "management", "majitel"];
        const userRankForMenu = localStorage.getItem("rank") || "";
        if (allowedManagementRanks.includes(userRankForMenu)) {
            const toggleBtn = document.getElementById("menuToggleBtn");
            if (toggleBtn) toggleBtn.style.display = "inline-block";
        }
    } else {
        window.location.href = "login.html";
    }
});

// Pomocná funkce na převedení formátu "2026-06" na "Červen 2026"
function formatMonthHTML(monthString) {
    if (!monthString) return "";
    const [year, month] = monthString.split("-");
    const date = new Date(year, parseInt(month) - 1, 1);
    const text = date.toLocaleDateString("cs-CZ", { month: "long", year: "numeric" });
    return text.charAt(0).toUpperCase() + text.slice(1); // První písmeno velké
}

async function loadMyAbsences() {
    const tbody = document.getElementById("myAbsenceList");
    if (!tbody) return;
    tbody.innerHTML = "";

    try {
        const q = query(collection(db, "absences"), where("userEmail", "==", userEmail));
        const querySnapshot = await getDocs(q);
        let count = 0;

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            count++;

            let statusBadge = `<span style="color: #ffd84d; font-weight:600;">⏳ Čeká</span>`;
            if (data.status === "schvaleno") statusBadge = `<span style="color: #00ff66; font-weight:600;">✓ Schváleno</span>`;
            if (data.status === "zamitnuto") statusBadge = `<span style="color: #ff4d4d; font-weight:600;">✕ Zamítnuto</span>`;
            if (data.adminNote) statusBadge += `<br><span style="font-size: 11px; opacity: 0.7; color: #ffd84d; display: block; margin-top: 2px;">💬 Vyjádření: ${data.adminNote}</span>`;

            const mFrom = formatMonthHTML(data.from);
            const mTo = formatMonthHTML(data.to);

            tbody.innerHTML += `
                <tr>
                    <td style="font-weight: 600;">${data.type}</td>
                    <td>${data.type === "Omluvenka" ? mFrom : `${mFrom} - ${mTo}`}</td>
                    <td style="opacity: 0.8; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${data.reason || ''}">${data.reason || "-"}</td>
                    <td>${statusBadge}</td>
                </tr>
            `;
        });

        if (count === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="opacity: 0.5; padding: 25px; text-align: center;">Zatím jsi nepodal žádnou žádost.</td></tr>`;
        }
    } catch (err) {
        console.error(err);
    }
}

document.getElementById("absenceForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const type = document.getElementById("absenceType").value;
    const from = document.getElementById("absenceFrom").value; // vrátí např. "2026-06"
    let to = document.getElementById("absenceTo").value; // vrátí např. "2026-11"
    const reason = document.getElementById("absenceReason").value.trim();
    const userName = localStorage.getItem("username") || "Řidič";

    // 🚀 STRIKTNÍ KONTROLA MAXIMÁLNĚ 6 MĚSÍCŮ PRO PAUZU
    if (type === "Pauza") {
        const [yearFrom, monthFrom] = from.split("-").map(Number);
        const [yearTo, monthTo] = to.split("-").map(Number);

        // Celkový počet zvolených měsíců
        const totalMonthsDiff = (yearTo - yearFrom) * 12 + (monthTo - monthFrom) + 1;

        if (totalMonthsDiff <= 0) {
            alert("Chyba: Koncový měsíc nemůže být dříve než počáteční!");
            return;
        }

        if (totalMonthsDiff > 6) {
            alert(`Chyba: Délka pauzy může být maximálně 6 měsíců! Zvolil jsi ${totalMonthsDiff} měsíců.`);
            return;
        }
    } else {
        to = ""; // u omluvenky konec prázdný
    }

    const newRequest = {
        userEmail: userEmail,
        userName: userName,
        type: type,
        from: from,
        to: to,
        reason: reason,
        status: "ceka",
        createdAt: new Date()
    };

    try {
        await addDoc(collection(db, "absences"), newRequest);

        // 🚀 DISCORD WEBHOOK INTEGRACE
        const discordWebhookUrl = "https://discord.com/api/webhooks/1513537254755405956/aDusJk9CZCpnMYXvOblvGPsHYhQ5oVUKyJ0-ln1tFAW8IHdgHKuzFimWU8ppdISxJb-R"; 
        
        const mFrom = formatMonthHTML(from);
        const mTo = formatMonthHTML(to);

        const discordMessage = {
            embeds: [{
                title: type === "Omluvenka" ? "📝 Nová omluvenka ke schválení" : "⏸️ Nová žádost o pauzu",
                color: type === "Omluvenka" ? 16738657 : 16766029,
                fields: [
                    { name: "👤 Řidič", value: `**${userName}** (${userEmail})`, inline: true },
                    { name: "📝 Typ", value: type, inline: true },
                    { name: "📅 Termín", value: type === "Omluvenka" ? mFrom : `${mFrom} - ${mTo}`, inline: false },
                    { name: "💬 Důvod / Poznámka", value: reason, inline: false }
                ],
                footer: { text: "alces-as.fun" },
                timestamp: new Date().toISOString()
            }]
        };

        fetch(discordWebhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(discordMessage)
        }).catch(err => console.error(err));

        alert("Žádost byla úspěšně odeslána a zprávu jsme poslali vedení na Discord!");
        document.getElementById("absenceForm").reset();
        handleTypeChange(); 
        await loadMyAbsences();
    } catch (err) {
        alert("Chyba při odesílání: " + err.message);
    }
});
</script>
</script>
</body>
