function print(text = "", className = "") {
    const line = document.createElement("div");
    line.className = "line " + className;
    line.innerText = text;
    consoleBox.appendChild(line);
    scrollDown();
}

function createInput(promptText, type = "text", callback) {
    const line = document.createElement("div");
    line.className = "input-line";

    const prompt = document.createElement("span");
    prompt.className = "prompt";
    prompt.innerText = promptText;

    const input = document.createElement("input");
    input.type = type;
    input.autocomplete = "off";

    const cursor = document.createElement("span");
    cursor.className = "fake-cursor";

    line.appendChild(prompt);
    line.appendChild(input);
    line.appendChild(cursor);
    consoleBox.appendChild(line);

    input.focus();

    input.addEventListener("focus", function() {
        cursor.style.display = "inline-block";
    });

    input.addEventListener("blur", function() {
        cursor.style.display = "none";
    });

    input.addEventListener("keydown", function(e) {
        if (e.key === "ArrowUp" && type !== "password") {
            e.preventDefault();

            if (commandHistory.length > 0) {
                if (historyIndex === -1) {
                    historyIndex = commandHistory.length - 1;
                } else if (historyIndex > 0) {
                    historyIndex--;
                }

                input.value = commandHistory[historyIndex];
            }

            return;
        }

        if (e.key === "ArrowDown" && type !== "password") {
            e.preventDefault();

            if (commandHistory.length > 0 && historyIndex !== -1) {
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    input.value = commandHistory[historyIndex];
                } else {
                    historyIndex = -1;
                    input.value = "";
                }
            }

            return;
        }

        if (e.key === "Tab" && type !== "password") {
            e.preventDefault();

            const value = input.value;
            const match = availableCommands.find(cmd => cmd.startsWith(value));

            if (match) {
                input.value = match;
            }

            return;
        }

        if (e.key === "Enter") {
            const value = input.value;
            input.disabled = true;
            cursor.remove();

            if (type === "password") {
                input.value = "********";
            } else {
                if (value.trim() !== "") {
                    commandHistory.push(value.trim());
                    historyIndex = -1;
                }
            }

            callback(value);
        }
    });

    scrollDown();
}

function handleCommand(command) {
    if (command === "") {
        askCommand();
        return;
    }

    if (command === "help") {
        print("");
        print("Dostupné příkazy:", "info");
        print("help                         zobrazí nápovědu");
        print("clear                        vyčistí konzoli");
        print("whoami                       zobrazí aktuálního uživatele");
        print("pages                        zobrazí existující stránky");
        print("-open/-target stránka.html   otevře stránku");
        print("dir                          zobrazí obsah složky");
        print("cd složka                    otevře složku");
        print("cd ..                        vrátí se o složku zpět");
        print("pwd                          zobrazí aktuální cestu");
        print("open soubor.html             otevře soubor/stránku");
        print("setrank                      spustí režim změny ranků");
        print("username rank                změna ranku v setrank režimu");
        print("setrank done                 dokončí změny a vypíše users export");
        print("setrank cancel               zruší připravené změny");
        print("pendingranks                 zobrazí připravené změny");
        print("rankhistory                  zobrazí historii změn ranků");
        print("clearhistory                 smaže historii změn ranků");
        print("ranks                        zobrazí všechny ranky");
        print("debug                        spustí debug režim");
        print("logout                       odhlásí uživatele");
        print("");
        askCommand();
        return;
    }

    if (command === "clear" || command === "cls") {
        consoleBox.innerHTML = "";
        askCommand();
        return;
    }

    if (command === "whoami") {
        print("");
        print("Uživatel: " + loggedUser.name);
        print("Username: " + loggedUser.username);
        print("Rank: " + loggedUser.rankName);
        print("Cesta: " + currentPath.join("\\"));
        print("");
        askCommand();
        return;
    }

    if (command === "pages") {
        print("");
        print("Existující stránky:", "info");
        existingPages.forEach(page => print("- " + page));
        print("");
        askCommand();
        return;
    }

    if (command === "ranks") {
        print("");
        print("Dostupné ranky:", "info");
        validRanks.forEach(rank => {
            print("- " + rank + " = " + getRankName(rank));
        });
        print("");
        askCommand();
        return;
    }

    if (command === "pwd") {
        print("");
        print(currentPath.join("\\"));
        print("");
        askCommand();
        return;
    }

    if (command === "dir") {
        const folder = getCurrentFolder();

        print("");
        print("Obsah složky " + currentPath.join("\\") + ":", "info");

        Object.keys(folder.content).forEach(itemName => {
            const item = folder.content[itemName];

            if (item.type === "folder") {
                print("[DIR]  " + itemName);
            } else {
                print("[FILE] " + itemName);
            }
        });

        print("");
        askCommand();
        return;
    }

    if (command.startsWith("cd ")) {
        const folderName = command.replace("cd ", "").trim();

        if (folderName === "..") {
            if (currentPath.length > 1) {
                currentPath.pop();
            }
            askCommand();
            return;
        }

        const folder = getCurrentFolder();

        if (!folder.content[folderName]) {
            print("Složka '" + folderName + "' neexistuje.", "error");
            askCommand();
            return;
        }

        if (folder.content[folderName].type !== "folder") {
            print("'" + folderName + "' není složka.", "error");
            askCommand();
            return;
        }

        currentPath.push(folderName);
        askCommand();
        return;
    }

    if (command.startsWith("open ")) {
        const fileName = command.replace("open ", "").trim();
        const folder = getCurrentFolder();

        if (!folder.content[fileName]) {
            print("Soubor '" + fileName + "' neexistuje.", "error");
            askCommand();
            return;
        }

        if (folder.content[fileName].type !== "file") {
            print("'" + fileName + "' není soubor.", "error");
            askCommand();
            return;
        }

        if (!folder.content[fileName].target) {
            print("Soubor '" + fileName + "' nelze otevřít.", "error");
            askCommand();
            return;
        }

        print("Otevírám: " + folder.content[fileName].target, "success");

        setTimeout(() => {
            window.location.href = folder.content[fileName].target;
        }, 500);

        return;
    }

    if (command === "logout") {
        localStorage.removeItem("username");
        localStorage.removeItem("rank");
        localStorage.removeItem("rankName");

        loggedUser = null;
        tempUsername = "";
        pendingRankChanges = [];
        currentPath = ["ALCES"];
        setrankMode = false;

        print("");
        print("Uživatel byl odhlášen.", "info");
        print("");
        askUsername();
        return;
    }

    if (command === "pendingranks") {

            print("Nemáš oprávnění zobrazit připravené změny. Tento příkaz je pouze pro Management a výš.", "error");
            askCommand();
            return;

        print("");
        print("Připravené změny ranků:", "info");

        if (pendingRankChanges.length === 0) {
            print("Žádné připravené změny.");
        } else {
            pendingRankChanges.forEach(change => {
                print("- " + change.summary);
            });
        }

        print("");
        askCommand();
        return;
    }

    if (command === "setrank") {
        if (!canManageRanks()) {
            print("Nemáš oprávnění měnit ranky. Tento režim je pouze pro Management a výš.", "error");
            askCommand();
            return;
        }

        setrankMode = true;
        pendingRankChanges = [];

        print("");
        print("SET RANK MODE spuštěn.", "success");
        print("Piš změny ve tvaru: username rank", "info");
        print("Příklad: 7001 majitel", "info");
        print("Dokončení: setrank done", "info");
        print("Zrušení: setrank cancel", "info");
        print("");

        askCommand();
        return;
    }

    if (command === "setrank done") {
        if (!canManageRanks()) {
            print("Nemáš oprávnění dokončit změny ranků.", "error");
            askCommand();
            return;
        }

        if (!setrankMode) {
            print("Nejsi v SET RANK MODE. Nejdřív napiš: setrank", "error");
            askCommand();
            return;
        }

        if (pendingRankChanges.length === 0) {
            print("Nejsou připravené žádné změny ranků.", "warning");
            setrankMode = false;
            askCommand();
            return;
        }

        setrankMode = false;

        print("");
        print("Změny ranků byly dokončeny.", "success");
        print("Počet změn: " + pendingRankChanges.length);
        print("");

        print("Souhrn změn:", "info");
        pendingRankChanges.forEach(change => {
            print("- " + change.summary);
        });

        print("");
        printUsersExport();

        pendingRankChanges = [];

        askCommand();
        return;
    }

    if (command === "setrank cancel") {
        if (!canManageRanks()) {
            print("Nemáš oprávnění zrušit změny ranků.", "error");
            askCommand();
            return;
        }

        if (!setrankMode) {
            print("Nejsi v SET RANK MODE. Nejdřív napiš: setrank", "error");
            askCommand();
            return;
        }

        pendingRankChanges.forEach(change => {
            const user = users.find(u => u.username === change.username);
            if (user) {
                user.rank = change.oldRank;
                user.rankName = change.oldRankName;
            }
        });

        pendingRankChanges = [];
        setrankMode = false;

        print("SET RANK MODE byl zrušen.", "success");
        askCommand();
        return;
    }

    if (command === "rankhistory") {
        if (!canManageRanks()) {
            print("Nemáš oprávnění zobrazit historii. Tento příkaz je pouze pro Management a výš.", "error");
            askCommand();
            return;
        }

        showHistory();
        askCommand();
        return;
    }

    if (command === "clearhistory") {
        if (!canManageRanks()) {
            print("Nemáš oprávnění smazat historii. Tento příkaz je pouze pro Management a výš.", "error");
            askCommand();
            return;
        }

        localStorage.removeItem("rankHistory");
        print("Historie změn ranků byla smazána.", "success");
        askCommand();
        return;
    }

    if (command.startsWith("-open/-target ")) {
        const target = command.replace("-open/-target ", "").trim();

        if (target === "") {
            print("Chyba: nebyl zadán název stránky.", "error");
            askCommand();
            return;
        }

        if (existingPages.includes(target)) {
            print("Otevírám: " + target, "success");
            setTimeout(() => {
                window.location.href = target;
            }, 500);
        } else {
            print("Stránka '" + target + "' neexistuje.", "error");
            askCommand();
        }

        return;
    }

    if (command === "debug") {
        print("");
        print("Spouštím debug režim...", "warning");
        print("VAROVÁNÍ: systém je nestabilní.", "warning");
        print("");

        let count = 0;

        const debugInterval = setInterval(() => {
            print("error: debug failed", "error");
            count++;

            if (count >= 300) {
                clearInterval(debugInterval);

                print("");
                print("FATAL ERROR: console crashed", "error");
                print("Uživatel bude odpojen...", "warning");

                setTimeout(() => {
                    localStorage.removeItem("username");
                    localStorage.removeItem("rank");
                    localStorage.removeItem("rankName");
                    window.location.href = "home.html";
                }, 1200);
            }
        }, 200);

        return;
    }

    if (setrankMode) {
        const parts = command.split(" ");

        if (parts.length !== 2) {
            print("Jsi v SET RANK MODE. Piš: username rank, nebo setrank done / setrank cancel", "warning");
            askCommand();
            return;
        }

        const targetUsername = parts[0];
        const newRank = parts[1];

        if (!validRanks.includes(newRank)) {
            print("Neplatný rank: " + newRank, "error");
            askCommand();
            return;
        }

        const targetUser = users.find(u => u.username === targetUsername);

        if (!targetUser) {
            print("Uživatel '" + targetUsername + "' neexistuje.", "error");
            askCommand();
            return;
        }

        if (targetUser.rank === newRank) {
            askCommand();
            return;
        }

        const oldRank = targetUser.rank;
        const oldRankName = targetUser.rankName;

        targetUser.rank = newRank;
        targetUser.rankName = getRankName(newRank);

        const date = new Date().toLocaleString("cs-CZ");
        const historyText = date + " | " + loggedUser.username + " změnil uživateli " + targetUser.username + " rank z " + oldRankName + " na " + targetUser.rankName;

        addHistory(historyText);

        pendingRankChanges.push({
            username: targetUser.username,
            oldRank: oldRank,
            oldRankName: oldRankName,
            newRank: newRank,
            newRankName: targetUser.rankName,
            summary: targetUser.username + ": " + oldRankName + " → " + targetUser.rankName
        });

        if (loggedUser.username === targetUser.username) {
            loggedUser.rank = newRank;
            loggedUser.rankName = getRankName(newRank);
            localStorage.setItem("rank", newRank);
            localStorage.setItem("rankName", getRankName(newRank));
        }

        askCommand();
        return;
    }

    print("Neznámý příkaz: " + command, "error");
    askCommand();
}

function getCurrentFolder() {
    let folder = fakeFileSystem[currentPath[0]];

    for (let i = 1; i < currentPath.length; i++) {
        folder = folder.content[currentPath[i]];
    }

    return folder;
}

function getRankName(rank) {
    switch(rank) {
        case "majitel": return "Majitel";
        case "management": return "Management";
        case "provozni-reditel": return "Provozní ředitel";
        case "dispecer": return "Dispečer";
        case "team-manager": return "Team manager";
        case "zasloužily-ridic": return "Zasloužilý řidič";
        case "ridic": return "Řidič";
        default: return rank;
    }
}

function canManageRanks() {
    return loggedUser && rankPower[loggedUser.rank] >= rankPower["management"];
}

function addHistory(text) {
    const history = JSON.parse(localStorage.getItem("rankHistory")) || [];
    history.push(text);
    localStorage.setItem("rankHistory", JSON.stringify(history));
}

function showHistory() {
    const history = JSON.parse(localStorage.getItem("rankHistory")) || [];

    print("");
    print("Historie změn ranků:", "info");

    if (history.length === 0) {
        print("Historie je prázdná.");
    } else {
        history.forEach(item => print("- " + item));
    }

    print("");
}

function printUsersExport() {
    print("Zkopíruj tento users kód do login.html:", "info");
    print("");
    print("const users = [");

    users.forEach((u, index) => {
        const comma = index === users.length - 1 ? "" : ",";
        print(`    { username: "${u.username}", password: "${u.password}", name: "${u.name}", rank: "${u.rank}", rankName: "${u.rankName}" }${comma}`);
    });

    print("];");
    print("");
}

function scrollDown() {
    consoleBox.scrollTop = consoleBox.scrollHeight;
}
</script>
