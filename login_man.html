<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Přihlášení | alces, a. s.</title>
<link rel="icon" href="favicon.png" type="image/png">
<!-- Poppins -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    font-family: 'Poppins', Arial, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                url("bus.jpg") center / cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.login {
    text-align: center;
    width: 320px;
}

.login img {
    width: 160px;
    margin-bottom: 10px;
}

.login p {
    margin: 0 0 30px;
    opacity: 0.8;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #08ac26;
    color: white;
    font-size: 15px;
    cursor: pointer;
}

button:hover {
    background: #008318;
}

.error {
    margin-top: 15px;
    color: #ffb3b3;
    font-size: 14px;
}

.back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    opacity: 0.85;
}

.back-btn:hover {
    opacity: 1;
    text-decoration: underline;
}

</style>
</head>

<body>

<a href="index.html" class="back-btn">← Zpět</a>

<div class="login">
    <!-- LOGO -->
    <img src="logo.png" alt="alces">

    <!-- SLOGAN -->
    <p>Interní systém společnosti</p>

    <input type="text" id="username" placeholder="Uživatelské jméno">
    <input type="password" id="password" placeholder="Heslo">

    <button onclick="login()">Přihlásit se</button>

    <div class="error" id="error"></div>
</div>

<script>
const users = [
    { username: "a", password: "a", name: "admin", rank: "majitel", rankName: "ADMIN" },
    { username: "s", password: "s", name: "admin", rank: "zkusebni-ridic", rankName: "ADMIN" },
    { username: "uni", password: "universal_", name: "universal", rank: "ridic", rankName: "Řidič - zkušební doba" },
    { username: "7001", password: "cauahejalcesjenej", name: "Karel P. M.", rank: "majitel", rankName: "Majitel" },
    { username: "7002", password: "josijehotas67", name: "Vašek K.", rank: "majitel", rankName: "Majitel - poloviční úvazek" },
    { username: "7003", password: "kamen730", name: "Vít V.", rank: "management", rankName: "Management" },
    { username: "7014", password: "silnice804", name: "Jakub K.", rank: "ridic", rankName: "Řidič" },
    { username: "7015", password: "reka239", name: "Jakub S.", rank: "ridic", rankName: "Řidič" },
    { username: "7021", password: "efn67", name: "Adam V.", rank: "provozni-reditel", rankName: "Provozní ředitel" },
    { username: "7026", password: "pole402", name: "Stanislav K.", rank: "ridic", rankName: "Řidič" },
    { username: "test", password: "test", name: "test", rank: "zkusebni-ridic", rankName: "ZD" },
];

function login() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;
    const error = document.getElementById("error");

    const user = users.find(user => user.username === u && user.password === p);

    if (user) {
        localStorage.setItem("username", user.name);
        localStorage.setItem("rank", user.rank);
        localStorage.setItem("rankName", user.rankName);
        window.location.href = "home.html";
    } else {
        error.innerText = "Nesprávné uživatelské jméno nebo heslo!";
    }
}
</script>
</body>
</html>
