<script>

window.addEventListener("load", () => {
    const logo = document.getElementById("introLogo");

    // chvilku stojí velké
    setTimeout(() => {
        logo.classList.add("move");
    }, 800);

    // po přesunu zmizí
    setTimeout(() => {
        logo.classList.add("hide");
    }, 1800);
});

window.onload = () => {
    const name = localStorage.getItem("username") || "řidiči";
    document.getElementById("welcomeText").innerText = `Dobrý den, ${name}`;
};

let state = "off";
let cycleTimeouts = [];
let currentRide = null;
let ridesHistory = [];
let currentLocation = null;
let currentNextLocation = null;
let rideStartTime = null;
let localRideHistory = [];
let currentCycle = [];
let pendingCycle = null;


function chooseStart() {

    const screen = document.getElementById("welcomeScreen");

    if (screen) {
        screen.style.opacity = "0";

        setTimeout(() => {
            screen.style.display = "none";
        }, 300);
    }

    const popup = document.createElement("div");
    popup.id = "startPopup";

    popup.innerHTML = `
    <div class="start-box">
        <h3>Kde jsi?:</h3>
        <select id="locationSelect">
            <option>Štěchovice</option>
            <option>Benešov</option>
            <option>Svinov</option>
            <option>Vítkovice</option>
            <option>Hrabůvka</option>
        </select>
        <button onclick="confirmStart()">Potvrdit</button>
    </div>
`;

    document.body.appendChild(popup);
}

function confirmStart() {
    const select = document.getElementById("locationSelect");
    currentLocation = select.value;

    document.getElementById("startPopup").remove();

    state = "waiting";
    updateUI();
    startCycle();
}

const cycles = [
{
    id: 1,
    start: "Štěchovice",
    end: "Benešov",
    stops: ["Štěchovice", "Chleby", "Benešov, Konopiště", "Václavice, Vatěkov", "Benešov, Terminál"],
    messages: ["Chleby", "Václavice, Vatěkov", "Benešov, Konopiště"],
    ride: "Štěch → BeneT | pid halo/1 - XXX/XX",

    passengers: [
        { name: "Alena Maszlagová", from: "Štěchovice", to: "Chleby" },
        { name: "Jirka Bedrna", from: "Štěchovice", to: "Benešov, Terminál" },
        { name: "Radmila Pelnářová", from: "Štěchovice", to: "Václavice, Vatěkov" }
    ]
},
{
    id: 2,
    start: "Poruba",
    end: "Svinov",
    stops: ["Poruba", "Zastávka A", "Zastávka B", "Svinov"],
    messages: ["📞 Taxi", "📍 Poruba", "👍 Ok"],
    ride: "Poruba → Svinov | tarif 1",

    passengers: [
        { name: "Jan Novák", from: "Poruba", to: "Zastávka B" },
        { name: "Eva Kovářová", from: "Poruba", to: "Svinov" }
    ]
},
{
    id: 3,
    start: "Svinov",
    end: "Vítkovice",
    stops: ["Svinov", "Zastávka X", "Zastávka Y", "Vítkovice"],
    messages: ["📞 Odvoz", "📍 Svinov", "👍 Díky"],
    ride: "Svinov → Vítkovice | tarif 2",

    passengers: [
        { name: "Petr Svoboda", from: "Svinov", to: "Zastávka Y" },
        { name: "Lucie Malá", from: "Svinov", to: "Vítkovice" }
    ]
}
];

/* ===== pomocné ===== */
function clearCycle() {
    cycleTimeouts.forEach(t => clearTimeout(t));
    cycleTimeouts = [];
}

/* ===== spuštění cyklu ===== */
function startCycle() {
    if (state !== "waiting") return;

    clearCycle();

    const selected = cycles[0]; // zatím fixně
    pendingCycle = selected;
    currentCycle = selected;

    const feed = document.getElementById("ridesFeed");
    feed.innerHTML = ""; // 👈 vyčistí obrazovku

    const passengers = selected.passengers;

    passengers.forEach((p, i) => {
        const t = setTimeout(() => {
            if (state !== "waiting") return;

            addRideCard(p);

            if (i === passengers.length - 1) {
                showSummaryCard(selected);
            }

        }, i * 600);

        cycleTimeouts.push(t);
    });
}

/* ===== přidání zprávy ===== */

/* ===== fullscreen zakázka ===== */
function showRide(rideText) {
    const popup = document.createElement("div");
    popup.id = "ridePopup";

    popup.innerHTML = `
        <div class="ride-box">
            <b>Nová jízda</b>
            <p>${rideText}</p>
            <button onclick="acceptRide()">Přijmout</button>
        </div>
    `;

    document.body.appendChild(popup);
}

/* ===== přijmutí ===== */
function acceptRide() {
    const popup = document.getElementById("ridePopup");

    document.body.classList.add("fade-screen");

    setTimeout(() => {
        document.body.classList.remove("fade-screen");
    }, 400);

    const selected = pendingCycle;

    currentCycle = selected.stops;
    currentMessages = selected.messages;
    currentRide = selected.ride;

    renderStops();
    renderRideFeed(selected);

    rideStartTime = Date.now();

    ridesHistory.push(currentRide);

    popup.remove();

    state = "drive";
    updateUI();
}

function getNextDeparture() {
    const now = new Date();

    let hours = now.getHours();
    let minutes = now.getMinutes();

    if (minutes >= 20) {
        hours += 1;
    }

    if (hours === 24) hours = 0;

    return `${String(hours).padStart(2, "0")}:20`;
}

function renderStops() {
    const box = document.getElementById("stopsView");

    box.innerHTML = `
        <div class="route-header">
            <span id="routeEnd"></span>
        </div>

        <div class="stops-container">
            <div class="stops-line"></div>
        </div>
    `;

    // 👇 konečná
    const end = currentCycle[currentCycle.length - 1];
    document.getElementById("routeEnd").innerText = end;

    const container = box.querySelector(".stops-container");

    currentCycle.forEach((stop, index) => {
        const div = document.createElement("div");
        div.className = "stop";
        div.innerText = stop;

        container.appendChild(div);

        // 👇 pomalejší + plynulejší animace
        setTimeout(() => {
            div.classList.add("show");
        }, index * 600); // 👈 zpomaleno
    });
}

function renderRideFeed(cycle) {
    const feed = document.getElementById("ridesFeed");

    feed.innerHTML = "";

    // 👇 souhrn nahoře
    const summary = document.createElement("div");
    summary.className = "ride-summary";
    summary.innerText = `${cycle.ride}`;
    feed.appendChild(summary);

    // 👇 jednotliví cestující
    cycle.passengers.forEach(p => {
        const div = document.createElement("div");
        div.className = "ride-card";
        div.innerText = `${p.name} | ${p.from} → ${p.to}`;

        feed.appendChild(div);
    });
}

function waitForDepartureAndStart() {
    const now = new Date();

    let target = new Date();
    target.setMinutes(20);
    target.setSeconds(0);
    target.setMilliseconds(0);

    // pokud už je po :20 → další hodina
    if (now.getMinutes() >= 20) {
        target.setHours(target.getHours() + 1);
    }

    const delay = target - now;

    setTimeout(() => {
        acceptRide();
    }, delay);
}

function addRideCard(p) {
    const feed = document.getElementById("ridesFeed");

    const div = document.createElement("div");
    div.className = "ride-card";

    div.innerHTML = `
        <div><b>${p.name}</b></div>
        <div>${p.from} → ${p.to}</div>
    `;

    feed.appendChild(div);

    setTimeout(() => {
        div.classList.add("show");
    }, 50);
}

function showSummaryCard(cycle) {
    const feed = document.getElementById("ridesFeed");

    const time = getNextDeparture();

    const div = document.createElement("div");
    div.className = "ride-summary";

    div.innerHTML = `
        🚌 ${cycle.ride}<br>
        ⏱ Odjezd: ${time}
    `;

    feed.prepend(div);

    // 👇 TADY SPUSTÍŠ AUTO START
    waitForDepartureAndStart();
}

/* ===== UI ===== */
function updateUI() {
    const controls = document.getElementById("controls");
    const light = document.getElementById("statusLight");
    const stopsView = document.getElementById("stopsView");

    if (!controls || !light) return;

    controls.innerHTML = "";
    light.className = "status-indicator " + state;

    // tlačítka podle stavu
    if (state === "off") {
        controls.innerHTML = `
            <button onclick="chooseStart()">Přihlásit do služby</button>
        `;
    }

    if (state === "waiting") {
        controls.innerHTML = `
            <button class="cancel" onclick="stopService()">Konec služby</button>
        `;
    }

    if (state === "drive") {
        controls.innerHTML = `
            <button onclick="confirmFinish()">Dokončit jízdu</button>
        `;
    }

    if (stopsView) {
    if (state === "drive") {
        stopsView.style.display = "flex"; // nejdřív zobrazit

        setTimeout(() => {
            stopsView.classList.add("active"); // fade IN
        }, 10);

    } else {
        stopsView.classList.remove("active"); // fade OUT

        setTimeout(() => {
            stopsView.style.display = "none"; // schovat až po animaci
        }, 400);
    }
    }
}

function startService() {
    state = "waiting";
    updateUI();
    startCycle();
}

function stopService() {
    state = "off";
    clearCycle();
    updateUI();

    showSummary();
}


function finishRide() {
    closeConfirm();

    if (currentRide) {
        localRideHistory.unshift(currentRide);
        updateRideHistory();
    }

    currentRide = null;

    state = "waiting";
    updateUI();

    let btn = document.getElementById("nextRideBtn");

    if (!btn) {
        btn = document.createElement("button");
        btn.id = "nextRideBtn";
        btn.innerText = "Další spoj";

        btn.style.position = "fixed";
        btn.style.bottom = "20px";
        btn.style.right = "20px";
        btn.style.zIndex = "9999";

        btn.onclick = () => {
            btn.remove();
            startCycle();
        };

        document.body.appendChild(btn);
    }
}

function updateRideHistory() {
    const box = document.getElementById("rideHistory");

    box.innerHTML = "";

    localRideHistory.forEach(ride => {
        const div = document.createElement("div");
        div.className = "ride-item";
        div.innerText = ride;

        box.appendChild(div);
    });
}

function confirmFinish() {
    const overlay = document.createElement("div");
    overlay.id = "confirmOverlay";

    overlay.innerHTML = `
        <div class="confirm-box">
            <p>Opravdu chceš ukončit jízdu?</p>
            <div class="confirm-buttons">
                <button onclick="finishRide()">Ano</button>
                <button onclick="closeConfirm()">Ne</button>
            </div>
        </div>
    `;

    document.body.appendChild(overlay);
}

function closeConfirm() {
    const overlay = document.getElementById("confirmOverlay");
    overlay.classList.add("fade-out");

    setTimeout(() => {
        overlay.remove();
    }, 250); // musí sedět s animací
}

function showSummary() {
    const overlay = document.createElement("div");
    overlay.id = "summaryOverlay";

    let list = "";

    if (ridesHistory.length === 0) {
        list = "<p>Žádné jízdy</p>";
    } else {
        ridesHistory.forEach(r => {
            list += `<div class="summary-item">${r}</div>`;
        });
    }

    overlay.innerHTML = `
        <div class="summary-box">
            <h3>Přehled jízd</h3>
            ${list}
            <button onclick="closeSummary()">Zavřít</button>
        </div>
    `;

    document.body.appendChild(overlay);
}

function closeSummary() {
    document.getElementById("summaryOverlay").remove();
    ridesHistory = []; // reset po session
}

function updateTime() {
    const now = new Date();

    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');

    const day = String(now.getDate()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const year = now.getFullYear();

    document.getElementById("time").innerText = `${hours}:${minutes}`;
    document.getElementById("date").innerText = `${day}.${month}.${year}`;
}

// každou sekundu refresh
setInterval(updateTime, 1000);
updateTime();

function logout() {
    localStorage.removeItem("username");
    window.location.href = "login.html";
}

/* kontrola loginu */
const user = localStorage.getItem("username");
if (!user) window.location.href = "login.html";

updateUI();
</script>
