<html lang="cs">
<head>
    <meta charset="UTF-8">

    <title>Správa dílen | alces, a. s.</title>
    <link rel="icon" href="fotky/univ/favicon.png" type="image/png" id="favicon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; font-family: 'Poppins', Arial, sans-serif; background: #121212; min-height: 100vh; color: white; }
        .topbar {
            height: 58px; position: fixed; top: 16px; left: 24px; right: 24px; z-index: 999;
            background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.18);
            display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-radius: 24px;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); box-shadow: 0 18px 55px rgba(0,0,0,0.28);
            box-sizing: border-box;
        }
        .topbar .logo { display: flex; align-items: center; height: 100%; }
        .topbar .logo a { margin-left: 0 !important; display: flex; align-items: center; }
        .topbar .logo img { height: 34px; width: auto; display: block; }
        
        /* Centrování textových odkazů vpravo */
        .topbar div:last-child { display: flex; align-items: center; height: 100%; }
        .topbar a { color: white; text-decoration: none; font-weight: 600; margin-left: 20px; display: flex; align-items: center; }

        @media (max-width: 1000px) { .layout-grid { grid-template-columns: 1fr; } }
        
        .panel {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);

            box-shadow: 0 15px 35px rgba(0,0,0,0.2); margin-bottom: 25px;
        }
        .panel h2 { margin-top: 0; font-size: 20px; color: #ffd84d; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; position: relative; }
        label { font-size: 14px; font-weight: 600; opacity: 0.9; }
        input, select, textarea {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
            color: white; padding: 12px; font-family: 'Poppins', sans-serif; font-size: 14px; box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #ffd84d; }
        button { font-family: 'Poppins', sans-serif; font-weight: 600; padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; transition: all 0.2s; }
        
        .btn-add { background: #00b84f; color: white; width: 100%; }
        .btn-add:hover { background: #00963f; transform: scale(1.01); }
        .btn-blue { background: #007bff; color: white; width: 100%; margin-bottom: 15px; }
        .btn-blue:hover { background: #0056b3; transform: scale(1.01); }
        .btn-delete { background: #ff4d4d; color: white; padding: 6px 12px; font-size: 12px; border-radius: 6px; }
        .btn-delete:hover { background: #cc3333; }
        
        #error-screen { display: none; text-align: center; margin-top: 150px; font-size: 20px; color: #ff4d4d; font-weight: 600; }

        /* Styly pro našeptávač */
        .suggestions-box {
            position: absolute; top: 100%; left: 0; right: 0;
            background: #1e1e1e; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 0 0 10px 10px; max-height: 150px; overflow-y: auto;
            z-index: 9999; display: none; list-style: none; padding: 0; margin: 0;
        }
        .suggestions-box li { padding: 10px 12px; cursor: pointer; font-size: 14px; }
        .suggestions-box li:hover { background: #ffd84d; color: #121212; font-weight: 600; }

        /* Kontrolní statistiky pod formulářem */
        .admin-log-block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 18px; margin-bottom: 15px; }
        .admin-log-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .stats-col { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; }
        .col-green h4 { color: #00ff66; margin: 0 0 5px 0; font-size: 13px; }
        .col-red h4 { color: #ff4d4d; margin: 0 0 5px 0; font-size: 13px; }
        .stats-list { list-style: none; padding: 0; margin: 0; max-height: 120px; overflow-y: auto; font-size: 12px; opacity: 0.85; }
        .stats-list li { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }

        /* Seznam vozidel k mazání */
        .admin-vehicle-list { max-height: 200px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; background: rgba(0,0,0,0.2); padding: 5px; list-style: none; margin: 0; }
        .admin-vehicle-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .admin-vehicle-item:last-child { border-bottom: none; }
                    .logo {
    display: flex;
    align-items: center;
    }

.logo img {
    height: 34px;
    width: auto;
    display: block;
}

</head>
<body>

<div class="topbar">
    <div class="logo">
        <a href="home.html">
            <img src="fotky/univ/logo.png" alt="alces">
        </a>
    </div>
    <div>
        <a href="dilny.html">← Zpět do dílen</a>
        <a href="home.html">Domů</a>
    </div>
</div>

<div id="error-screen">Ověřuji oprávnění...</div>

<div class="content" id="mainContent" style="display: none;">
    <h1>Administrace a správa technického zázemí</h1>
    
    <div class="layout-grid">
        <div class="panel">
            <h2>1. Publikovat nové oznámení z dílen</h2>
            <form id="workshopForm" autocomplete="off">
                <div class="form-group">
                    <label>Typ akce</label>
                    <select id="actionType" required onchange="handleActionTypeChange()">
                        <option value="Aktualizace repaintu">Aktualizace repaintu</option>
                        <option value="Nová úprava pro vozidlo">Nová úprava pro vozidlo</option>
                        <option value="Aktualizace mapy">Aktualizace mapy</option>
                        <option value="Jiné">Jiné (Vlastní nadpis)</option>
                    </select>
                </div>

                <div class="form-group" id="customTitleGroup" style="display: none;">
                    <label>Vlastní nadpis zprávy</label>
                    <input type="text" id="customTitle" placeholder="např. Údržba klimatizací">
                </div>

                <div class="form-group" id="evcGroup">
                    <label>Evidenční čísla vozidel (odděluj čárkou)</label>
                    <input type="text" id="vehicleEvc" placeholder="Začni psát ev.č. (např. 2104)">
                    <ul id="suggestions" class="suggestions-box"></ul>
                </div>

                <div class="form-group">
                    <label>Dodatek k hlášení / Obsah zprávy</label>
                    <textarea id="actionDetails" placeholder="Zde rozepiš podrobnosti..."></textarea>
                </div>

                <button type="submit" class="btn-add">Odeslat a propsat do systému</button>
            </form>
        </div>

        <div class="panel">
            <h2>2. Registrace a správa vozidel (Ev.č.)</h2>
            <form id="addVehicleForm">
                <div class="form-group">
                    <label>Evidenční číslo nového vozu</label>
                    <input type="text" id="newVehicleEvc" placeholder="např. 7015" required>
                </div>
                <button type="submit" class="btn-blue">➕ Zaregistrovat vozidlo</button>
            </form>

            <label style="display:block; margin-bottom:8px; font-size:14px; font-weight:600; opacity:0.9;">Aktuálně registrovaná vozidla:</label>
            <ul class="admin-vehicle-list" id="adminVehiclesContainer">
                <li style="opacity:0.5; padding:8px 12px;">Načítám vozový park...</li>
            </ul>
        </div>
    </div>

    <div class="panel" style="margin-top: 20px;">
        <h2>Kontrola přečtení zpráv z dílen</h2>
        <div id="adminWorkshopLogsContainer">
            <p style="opacity: 0.5;">Načítám přehled kontroly...</p>
        </div>
    </div>
</div>

<script>
function handleActionTypeChange() {
    const type = document.getElementById("actionType").value;
    const customTitleGroup = document.getElementById("customTitleGroup");
    const evcGroup = document.getElementById("evcGroup");
    const vehicleEvc = document.getElementById("vehicleEvc");
    const actionDetails = document.getElementById("actionDetails");

    if (type === "Jiné") {
        customTitleGroup.style.display = "flex";
        document.getElementById("customTitle").setAttribute("required", "true");
        evcGroup.style.display = "flex";
        vehicleEvc.removeAttribute("required");
        actionDetails.setAttribute("required", "true");
    } else if (type === "Aktualizace mapy") {
        customTitleGroup.style.display = "none";
        document.getElementById("customTitle").removeAttribute("required");
        evcGroup.style.display = "none";
        vehicleEvc.removeAttribute("required");
        actionDetails.setAttribute("required", "true");
    } else {
        customTitleGroup.style.display = "none";
        document.getElementById("customTitle").removeAttribute("required");
        evcGroup.style.display = "flex";
        vehicleEvc.setAttribute("required", "true");
        actionDetails.removeAttribute("required");
    }
}
window.addEventListener("DOMContentLoaded", handleActionTypeChange);
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, setDoc, getDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAwRV2OuIhA-oyg295gIv5-4zfzO4qb9MY",
    authDomain: "alces-d505c.firebaseapp.com",
    projectId: "alces-d505c",
    storageBucket: "alces-d505c.firebasestorage.app",
    messagingSenderId: "318520073072",
    appId: "1:318520073072:web:53ab5c0033f60e96bbcdb5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const allowedRanks = ["team-manager", "dispecer", "provozni-reditel", "management", "majitel"];
let registeredVehicles = []; 
let allUsers = [];

onAuthStateChanged(auth, async (user) => {
    const userRank = localStorage.getItem("rank") || "";
    if (user && allowedRanks.includes(userRank)) {
        document.getElementById("mainContent").style.display = "block";
        document.getElementById("error-screen").style.display = "none";
        
        await fetchAllUsers();
        await loadActiveVehiclesList(); 
        await loadAdminWorkshopSystem(); 
    } else {
        document.getElementById("error-screen").innerText = "Přístup odepřen. Tuto stránku může upravovat pouze vedení.";
        document.getElementById("error-screen").style.display = "block";
    }
});

async function fetchAllUsers() {
    allUsers = [];
    try {
        const querySnapshot = await getDocs(collection(db, "users"));
        querySnapshot.forEach(d => {
            allUsers.push({
                email: d.id,
                name: d.data().name || d.data().username || "Bez jména",
                rankName: d.data().rankName || "Řidič"
            });
        });
    } catch(e) { console.error(e); }
}

// 🚍 NAČTENÍ VOZIDEL PRO NAŠEPTÁVAČ + SPRÁVU MAZÁNÍ
async function loadActiveVehiclesList() {
    registeredVehicles = [];
    const container = document.getElementById("adminVehiclesContainer");
    if (!container) return;
    container.innerHTML = "";

    try {
        const querySnapshot = await getDocs(collection(db, "vehicles"));
        const vehicles = [];
        querySnapshot.forEach(d => vehicles.push(d.id));
        vehicles.sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

        registeredVehicles = vehicles;

        if (vehicles.length === 0) {
            container.innerHTML = `<li style="opacity:0.5; padding:8px 12px;">Žádná registrovaná vozidla.</li>`;
            return;
        }

        vehicles.forEach(evc => {
            const li = document.createElement("li");
            li.className = "admin-vehicle-item";
            li.innerHTML = `
                <span>🚍 <strong>Ev.č. ${evc}</strong></span>
                <button class="btn-delete-vehicle btn-delete" data-evc="${evc}">Smazat ✕</button>
            `;

            // Akce pro smazání vozidla
            li.querySelector(".btn-delete-vehicle").addEventListener("click", async () => {
                if (confirm(`Opravdu chceš trvale smazat vozidlo ev.č. ${evc} z databáze?`)) {
                    await deleteDoc(doc(db, "vehicles", evc));
                    await loadActiveVehiclesList(); // Znovu načteme seznam a našeptávač
                }
            });

            container.appendChild(li);
        });
    } catch(e) { console.error(e); }
}

// LOGIKA NAŠEPTÁVAČE
const inputEvc = document.getElementById("vehicleEvc");
const suggestionsList = document.getElementById("suggestions");

inputEvc.addEventListener("input", () => {
    const value = inputEvc.value.trim();
    suggestionsList.innerHTML = "";
    
    if (!value) { suggestionsList.style.display = "none"; return; }

    const parts = value.split(",");
    const currentQuery = parts[parts.length - 1].trim().toLowerCase();

    if (!currentQuery) { suggestionsList.style.display = "none"; return; }

    const filtered = registeredVehicles.filter(v => 
        v.toLowerCase().includes(currentQuery) && !value.toLowerCase().includes(v.toLowerCase())
    );

    if (filtered.length === 0) { suggestionsList.style.display = "none"; return; }

    filtered.forEach(evc => {
        const li = document.createElement("li");
        li.innerText = `🚍 Ev.č. ${evc}`;
        li.addEventListener("click", () => {
            parts[parts.length - 1] = " " + evc; 
            inputEvc.value = parts.join(",") + ", "; 
            suggestionsList.innerHTML = "";
            suggestionsList.style.display = "none";
            inputEvc.focus();
        });
        suggestionsList.appendChild(li);
    });

    suggestionsList.style.display = "block";
});

document.addEventListener("click", (e) => {
    if (e.target !== inputEvc) { suggestionsList.style.display = "none"; }
});

// KONTROLNÍ SYSTÉM ČTENÍ HLÁŠENÍ
async function loadAdminWorkshopSystem() {
    const container = document.getElementById("adminWorkshopLogsContainer");
    if (!container) return;
    container.innerHTML = "";

    try {
        const querySnapshot = await getDocs(collection(db, "workshop_logs"));
        const logsArray = [];
        querySnapshot.forEach(d => logsArray.push({ id: d.id, data: d.data() }));
        logsArray.sort((a, b) => (b.data.createdAt?.seconds || 0) - (a.data.createdAt?.seconds || 0));

        if (logsArray.length === 0) {
            container.innerHTML = `<p style="opacity: 0.5; margin:0;">Žádná oznámení nebyla vydána.</p>`;
            return;
        }

        logsArray.forEach(item => {
            const logId = item.id;
            const logData = item.data;
            const confirmedEmails = logData.confirmedBy || [];

            const confirmedPeople = [];
            const missingPeople = [];

            allUsers.forEach(u => {
                if (confirmedEmails.includes(u.email)) {
                    confirmedPeople.push(u);
                } else {
                    missingPeople.push(u);
                }
            });

            const date = logData.createdAt ? new Date(logData.createdAt.toDate()).toLocaleDateString("cs-CZ") : "Neznámý čas";

            const block = document.createElement("div");
            block.className = "admin-log-block";
            block.innerHTML = `
                <div class="admin-log-header">
                    <div>
                        <h3 style="margin:0; font-size:16px; color:#ffd84d;">${logData.title}</h3>
                        <span style="font-size:11px; opacity:0.5;">Publikováno: ${date} | Od: ${logData.author}</span>
                    </div>
                    <button class="btn-delete" data-id="${logId}">Smazat ✕</button>
                </div>
                <p style="font-size:13px; opacity:0.8; margin:5px 0; white-space:pre-wrap;">${logData.text}</p>
                
                <div class="stats-grid">
                    <div class="stats-col col-green">
                        <h4>Potvrdili (${confirmedPeople.length}) ✓</h4>
                        <ul class="stats-list" id="yes-${logId}"></ul>
                    </div>
                    <div class="stats-col col-red">
                        <h4>NEPOTVRDILI (${missingPeople.length}) ✕</h4>
                        <ul class="stats-list" id="no-${logId}"></ul>
                    </div>
                </div>
            `;

            const ulYes = block.querySelector(`#yes-${logId}`);
            if (confirmedPeople.length === 0) { ulYes.innerHTML = `<li style="opacity:0.4;">Nikdo.</li>`; }
            else { confirmedPeople.forEach(p => ulYes.innerHTML += `<li><strong>${p.name}</strong> (${p.rankName})</li>`); }

            const ulNo = block.querySelector(`#no-${logId}`);
            if (missingPeople.length === 0) { ulNo.innerHTML = `<li style="color:#00ff66;">Všichni potvrdili!</li>`; }
            else { missingPeople.forEach(p => ulNo.innerHTML += `<li><strong>${p.name}</strong> (${p.rankName})</li>`); }

            block.querySelector(".btn-delete").addEventListener("click", async () => {
                if (confirm(`Opravdu chceš smazat toto hlášení z dílen?`)) {
                    await deleteDoc(doc(db, "workshop_logs", logId));
                    await loadAdminWorkshopSystem();
                }
            });

            container.appendChild(block);
        });
    } catch(err) { console.error(err); }
}

// ➕ LOGIKA PŘIDÁVÁNÍ NOVÉHO VOZIDLA
document.getElementById("addVehicleForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const evc = document.getElementById("newVehicleEvc").value.trim();
    if(!evc) return;

    try {
        const vehicleRef = doc(db, "vehicles", evc);
        const docSnap = await getDoc(vehicleRef);

        if (docSnap.exists()) {
            alert(`Chyba: Vozidlo ev.č. ${evc} už v databázi existuje!`);
            return;
        }

        await setDoc(vehicleRef, {
            lastStatus: "Vozidlo bylo nově zaregistrováno do systému.",
            updatedAt: new Date()
        });

        alert(`Vozidlo Ev.č. ${evc} bylo úspěšně přidáno!`);
        document.getElementById("addVehicleForm").reset();
        await loadActiveVehiclesList(); 
    } catch (err) { alert("Chyba: " + err.message); }
});

// ODESLÁNÍ HLÁŠENÍ Z DÍLEN
document.getElementById("workshopForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const type = document.getElementById("actionType").value;
    const customTitle = document.getElementById("customTitle").value.trim();
    const rawEvc = document.getElementById("vehicleEvc").value.trim();
    const details = document.getElementById("actionDetails").value.trim();
    const authorName = localStorage.getItem("username") || "Management";

    const evcArray = rawEvc ? rawEvc.split(",").map(s => s.trim()).filter(s => s.length > 0) : [];

    let finalTitle = "";
    let finalLogText = "";

    if (type === "Aktualizace repaintu") {
        finalTitle = "Aktualizace repaintu";
        if (evcArray.length === 1) {
            finalLogText = `Na disk byla nahrána nová verze repaintu vozidla ${evcArray[0]}.`;
        } else {
            finalLogText = `Na disk byly nahrány nové verze repaintů vozidel ${evcArray.join(", ")}.`;
        }
        if (details) finalLogText += `\n\nDodatek:\n${details}`;
    } else if (type === "Nová úprava pro vozidlo") {
        finalTitle = "Nová úprava vozidla";
        if (evcArray.length === 1) {
            finalLogText = `Byla vydána nová úprava pro vozidlo ${evcArray[0]}.`;
        } else {
            finalLogText = `Byly vydány nové úpravy pro vozidla ${evcArray.join(", ")}.`;
        }
        if (details) finalLogText += `\n\nDodatek:\n${details}`;
    } else if (type === "Aktualizace mapy") {
        finalTitle = "Aktualizace mapy";
        finalLogText = details;
    } else {
        finalTitle = customTitle || "Zpráva z dílen";
        finalLogText = details;
        if (evcArray.length > 0) finalLogText += `\n\nTýká se vozů: ${evcArray.join(", ")}`;
    }

    try {
        const timestamp = new Date();

        // 1. Uložení logu do Firebase
        await addDoc(collection(db, "workshop_logs"), {
            title: finalTitle,
            text: finalLogText,
            author: authorName,
            createdAt: timestamp,
            type: type,
            evcList: evcArray,
            confirmedBy: []
        });

        // 2. Propsání do stavu konkrétních vozidel ve Firebase
        for (const evc of evcArray) {
            const vehicleRef = doc(db, "vehicles", evc);
            await setDoc(vehicleRef, {
                lastStatus: `${finalTitle} (${timestamp.toLocaleDateString("cs-CZ")}):\n${details || "Bez bližšího dodatku."}`,
                updatedAt: timestamp
            }, { merge: true });
        }

        // 🚀 3. NOVÉ: DISCORD WEBHOOK PRO DÍLNY
        // Sem vlož URL webhooku (může být stejný jako na omluvenky, nebo jiný veřejný kanál)
        const discordWebhookUrl = "https://discord.com/api/webhooks/1519715536508817560/43mE_t36uwfo_I3mG7KtVoYBVeplA5yedjeYFjnB1cOeRIrdC4oae1D5N2qtiJ-QlRSa"; 

        // Nastavení barvy embedu podle typu akce
        let embedColor = 8421504; // Výchozí šedá pro "Jiné"
        if (type === "Aktualizace repaintu") embedColor = 16429312;
        if (type === "Nová úprava pro vozidlo") embedColor = 16729956;
        if (type === "Aktualizace mapy") embedColor = 3066993;  

        const discordMessage = {
            embeds: [{
                title: `${finalTitle}`,
                description: `${finalLogText}`,
                color: embedColor,
                fields: [
                    { name: "👤 Publikoval", value: authorName, inline: true },
                    { name: "🚍 Dotčená vozidla", value: evcArray.length > 0 ? evcArray.join(", ") : "-", inline: true }
                ],
                footer: { text: "alces-as.fun" },
                timestamp: timestamp.toISOString()
            }]
        };

        // Odeslání na Discord na pozadí
        fetch(discordWebhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(discordMessage)
        }).catch(err => console.error("Discord webhook pro dílny selhal:", err));


        // 4. Potvrzení na webu a reset formuláře
        alert("Záznam úspěšně publikován a odeslán na Discord!");
        document.getElementById("workshopForm").reset();
        handleActionTypeChange();
        await loadAdminWorkshopSystem(); 
    } catch (err) { alert("Chyba: " + err.message); }
});

function upravFaviconuPodleRezimu() {
    const favicon = document.getElementById('favicon');
    if (!favicon) return;

    const jeTemnyRezim = window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (jeTemnyRezim) {
        favicon.href = 'fotky/univ/favicon.png';  // Ikonka pro tmavý režim (např. svítivá/bílá)
    } else {
        favicon.href = 'fotky/univ/favicon-cerna.png'; // Ikonka pro světlý režim (např. tmavá)
    }
}

upravFaviconuPodleRezimu();

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', upravFaviconuPodleRezimu);
</script>
</body>
</html>
