<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentoři | alces, a. s.</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Poppins', Arial, sans-serif;
        background-image: url("fotky/home/gradient.png"), url("fotky/home/pozadi.png");
        background-size: cover;
        background-position: center top;
        background-repeat: no-repeat;
        min-height: 100vh;
        color: white;
    }

    /* Horní lišta převzatá z tvého webu */
    .topbar {
        height: 58px; position: fixed; top: 16px; left: 24px; right: 24px; z-index: 999;
        background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.18);
        display: flex; align-items: center; justify-content: space-between; padding: 0 18px; border-radius: 24px;
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        box-shadow: 0 18px 55px rgba(0,0,0,0.28);
    }
    .topbar a { color: white; text-decoration: none; font-weight: 600; margin-left: 20px; }

    .content { margin: 120px 40px 40px 40px; }
    h1 { font-size: 36px; font-weight: 700; text-shadow: 0 4px 20px rgba(0,0,0,0.4); margin-bottom: 5px; }
    .role-badge { display: inline-block; padding: 5px 15px; background: gold; color: black; border-radius: 999px; font-weight: 600; font-size: 14px; margin-bottom: 30px; }

    /* Třísloupcový grid */
    .grid-container { 
        display: grid; 
        grid-template-columns: 1.2fr 2fr 1.3fr; 
        gap: 24px; 
        align-items: start;
    }
    
    @media (max-width: 1100px) { 
        .grid-container { grid-template-columns: 1fr 1.5fr; } 
        .right-sidebar { grid-column: span 2; }
    }
    @media (max-width: 800px) { 
        .grid-container { grid-template-columns: 1fr; } 
        .right-sidebar { grid-column: span 1; }
    }

    /* Stylové boxy (Glassmorphism) */
    .panel {
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
        padding: 24px; border-radius: 24px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }
    .panel h2 { margin-top: 0; font-size: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; color: #ffd84d; }

    .panel-primary {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.22);
    }

    /* Vnitřní větvení pravého sloupce pro admina */
    .right-sidebar { display: flex; flex-direction: column; gap: 24px; }

    /* Seznamy a větší kartičky řidičů */
    .user-list { list-style: none; padding: 0; margin: 0; }
    .user-item {
        display: flex; justify-content: space-between; align-items: center;
        padding: 18px 22px; background: rgba(255,255,255,0.05); margin-bottom: 12px;
        border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .user-info { display: flex; flex-direction: column; gap: 2px; }
    .user-name { font-weight: 700; font-size: 18px; color: #fff; }
    .user-email { font-size: 13px; opacity: 0.6; }
    .mentor-status { font-size: 13px; color: #ffd84d; font-weight: 600; margin-top: 4px; }

    /* Tlačítka */
    button {
        font-family: 'Poppins', sans-serif; font-weight: 600; padding: 10px 20px;
        border-radius: 12px; border: none; cursor: pointer; transition: all 0.2s; font-size: 14px;
    }
    .btn-claim { background: #00b84f; color: white; }
    .btn-claim:hover { background: #00963f; transform: scale(1.03); }
    .btn-release { background: rgba(212, 0, 0, 0.75); color: white; padding: 10px 24px; }
    .btn-release:hover { background: rgba(190, 0, 0, 0.9); transform: scale(1.03); }
    .btn-disabled { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.25); cursor: not-allowed; }

    /* Formulář pro zprávu */
    .msg-form { display: flex; flex-direction: column; gap: 12px; }
    textarea {
        background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 14px;
        color: white; padding: 14px; font-family: 'Poppins', sans-serif; resize: vertical; min-height: 100px; font-size: 14px;
    }
    textarea:focus { outline: none; border-color: #ffd84d; }
    .btn-save { background: #ffd84d; color: black; align-self: stretch; padding: 10px; border-radius: 12px; }
    .btn-save:hover { background: #e6c240; }

    /* Select pro majitele */
    .owner-select {
        background: #1a1a1a; color: white; border: 1px solid rgba(255,255,255,0.3);
        padding: 8px 12px; border-radius: 10px; font-family: 'Poppins', sans-serif; font-size: 14px; cursor: pointer;
    }

    .logo {
    display: flex;
    align-items: center;
    }

.logo img {
    height: 34px;
    width: auto;
    display: block;
}
</style>
</head>
<body>

<div class="topbar">
        <div class="logo">
        <a href="home.html">
            <img src="fotky/univ/logo.png" alt="alces">
        </a>
    </div>
    <div>
        <a href="home.html">Domů</a>
        <a href="#" style="color: #ffd84d;">Mentoři</a>
    </div>
</div>

<div class="content">
    <h1 id="welcomeTitle">Načítání systému...</h1>
    <div class="role-badge" id="roleBadge">Ověřování identity...</div>

    <div class="grid-container">
        <div class="panel">
            <h2>Volní nováčci</h2>
            <ul class="user-list" id="unassignedList">
                <p style="opacity:0.5">Načítám nováčky...</p>
            </ul>
        </div>

        <div class="panel panel-primary">
            <h2 id="middlePanelTitle">Moji svěření nováčci</h2>
            <ul class="user-list" id="myStudentsList">
                <p style="opacity:0.5">Zatím žádná data.</p>
            </ul>
        </div>

        <div class="right-sidebar">
            <div class="panel" id="panelVasikMsg" style="display:none;">
                <h2>Bublina: Vašek K. (7002)</h2>
                <div class="msg-form">
                    <textarea id="msgVasikText" placeholder="Zpráva pro Vaškovu bublinu..."></textarea>
                    <button class="btn-save" id="saveVasikBtn">Uložit</button>
                </div>
            </div>

            <div class="panel" id="panelHorryMsg" style="display:none;">
                <h2>Bublina: Jan H. (7067)</h2>
                <div class="msg-form">
                    <textarea id="msgHorryText" placeholder="Zpráva pro Honzovu bublinu..."></textarea>
                    <button class="btn-save" id="saveHorryBtn">Uložit</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAwRV2OuIhA-oyg295gIv5-4zfzO4qb9MY",
    authDomain: "alces-d505c.firebaseapp.com",
    projectId: "alces-d505c",
    storageBucket: "alces-d505c.firebasestorage.app",
    messagingSenderId: "318520073072",
    appId: "1:318520073072:web:53ab5c0033f60e96bbcdb5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUserEmail = "";
let currentMentorId = ""; 
let isOwner = false;

onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUserEmail = user.email;
        setupPermissions();
        await loadData();
    } else {
        currentUserEmail = localStorage.getItem("userEmail") || "ytkapr@gmail.com"; // Testovací fallback (majitel)
        setupPermissions();
        await loadData();
    }
});

async function setupPermissions() {
    if (currentUserEmail === "ytkapr@gmail.com") {
        isOwner = true;
        document.getElementById("welcomeTitle").innerText = "Ústřední správa mentorů";
        document.getElementById("roleBadge").innerText = "Administrátor (ID 7001)";
        document.getElementById("roleBadge").style.background = "#ff3333";
        document.getElementById("roleBadge").style.color = "white";
        document.getElementById("middlePanelTitle").innerText = "Kompletní přehled přidělených nováčků";
        
        // Majitel vidí a spravuje oba mentory najednou
        document.getElementById("panelVasikMsg").style.display = "block";
        document.getElementById("panelHorryMsg").style.display = "block";
        loadMentorMessage("7002", "msgVasikText");
        loadMentorMessage("7067", "msgHorryText");
    } else if (currentUserEmail === "vasik.kovyt.stream@gmail.com") {
        currentMentorId = "7002";
        document.getElementById("welcomeTitle").innerText = "Panel mentora";
        document.getElementById("roleBadge").innerText = "Mentor (ID 7002)";
        document.getElementById("middlePanelTitle").innerText = "Moji svěření nováčci";
        document.getElementById("panelVasikMsg").style.display = "block";
        loadMentorMessage("7002", "msgVasikText");
    } else if (currentUserEmail === "horry.sheron@gmail.com") {
        currentMentorId = "7067";
        document.getElementById("welcomeTitle").innerText = "Panel mentora";
        document.getElementById("roleBadge").innerText = "Mentor (ID 7067)";
        document.getElementById("middlePanelTitle").innerText = "Moji svěření nováčci";
        document.getElementById("panelHorryMsg").style.display = "block";
        loadMentorMessage("7067", "msgHorryText");
    } else {
        document.getElementById("welcomeTitle").innerText = "Přístup odepřen";
        document.getElementById("roleBadge").innerText = "Nemáš oprávnění mentora";
        document.querySelector(".grid-container").style.display = "none";
    }
}

async function loadMentorMessage(mId, textareaId) {
    const mentorSnap = await getDoc(doc(db, "mentors", mId));
    if(mentorSnap.exists()) {
        document.getElementById(textareaId).value = mentorSnap.data().message || "";
    }
}

// Hlavní načítání dat z Firebase
// Hlavní načítání dat z Firebase
async function loadData() {
    const unassignedList = document.getElementById("unassignedList");
    const myStudentsList = document.getElementById("myStudentsList");
    
    unassignedList.innerHTML = "";
    myStudentsList.innerHTML = "";

    let hasAssignedAny = false;
    let hasUnassignedAny = false;

    try {
        // TADY JE TA OPRAVA: Vždy při volání loadData() si stáhneme úplně nová, aktuální data
        const querySnapshot = await getDocs(collection(db, "users"));
        
        querySnapshot.forEach((userDoc) => {
            const userData = userDoc.data();
            const userDocId = userDoc.id; 

            if (userData.rank === "zkusebni-ridic") {
                const mentorId = userData.mentorId ? String(userData.mentorId).trim() : "";
                const zobrazenoJmeno = userData.name || userData.username || "Bez Jména";

                const li = document.createElement("li");
                li.className = "user-item";
                
                let mentorStatusText = "Volný nováček";
                if(mentorId === "7002") mentorStatusText = "Svěřen: Vašek K. (7002)";
                if(mentorId === "7067") mentorStatusText = "Svěřen: Jan H. (7067)";

                li.innerHTML = `
                    <div class="user-info">
                        <span class="user-name">${zobrazenoJmeno}</span>
                        <span class="user-email">${userDocId}</span>
                        <span class="mentor-status">${mentorStatusText}</span>
                    </div>
                `;

                const btnContainer = document.createElement("div");

                if (isOwner) {
                    // CO VIDÍ MAJITEL U KAŽDÉHO ČLOVĚKA:
                    const select = document.createElement("select");
                    select.className = "owner-select";
                    select.innerHTML = `
                        <option value="" ${mentorId === "" ? "selected" : ""}>-- Bez mentora --</option>
                        <option value="7002" ${mentorId === "7002" ? "selected" : ""}>Vašek K. (7002)</option>
                        <option value="7067" ${mentorId === "7067" ? "selected" : ""}>Jan H. (7067)</option>
                    `;
                    
                    select.addEventListener("change", async () => {
                        // 1. Zápis do Firebase
                        await updateDoc(doc(db, "users", userDocId), { mentorId: select.value });
                        // 2. Okamžité znovunačtení čerstvých dat, které lidi správně přesune
                        await loadData(); 
                    });
                    btnContainer.appendChild(select);
                    li.appendChild(btnContainer);

                    // ROZDĚLENÍ SEZNAMŮ PRO MAJITELE: 
                    if (!mentorId) {
                        unassignedList.appendChild(li);
                        hasUnassignedAny = true;
                    } else {
                        myStudentsList.appendChild(li);
                        hasAssignedAny = true;
                    }

                } else {
                    // CO VIDÍ MENTORI (Vašík / Horry)
                    if (!mentorId) {
                        const btn = document.createElement("button");
                        btn.className = "btn-claim";
                        btn.innerText = "Zabrat nováčka";
                        btn.addEventListener("click", async () => {
                            await updateDoc(doc(db, "users", userDocId), { mentorId: currentMentorId });
                            await loadData();
                        });
                        btnContainer.appendChild(btn);
                        li.appendChild(btnContainer);
                        unassignedList.appendChild(li);
                        hasUnassignedAny = true;
                    } else if (mentorId === currentMentorId) {
                        const btn = document.createElement("button");
                        btn.className = "btn-release";
                        btn.innerText = "Uvolnit";
                        btn.addEventListener("click", async () => {
                            await updateDoc(doc(db, "users", userDocId), { mentorId: "" });
                            await loadData();
                        });
                        btnContainer.appendChild(btn);
                        li.appendChild(btnContainer);
                        myStudentsList.appendChild(li);
                        hasAssignedAny = true;
                    } else {
                        const btn = document.createElement("button");
                        btn.className = "btn-disabled";
                        btn.innerText = "Zabráno jiným";
                        btn.disabled = true;
                        btnContainer.appendChild(btn);
                        li.appendChild(btnContainer);
                        unassignedList.appendChild(li);
                        hasUnassignedAny = true;
                    }
                }
            }
        });

        if (!hasUnassignedAny) unassignedList.innerHTML = `<p style="opacity:0.5; padding: 10px;">Žádní volní zkušební řidiči.</p>`;
        if (!hasAssignedAny) myStudentsList.innerHTML = `<p style="opacity:0.5; padding: 10px;">Žádní přidělení řidiči v přehledu.</p>`;

    } catch (error) {
        console.error("Chyba načítání dat:", error);
    }
}

// AKCE UKLÁDÁNÍ PRO TEXTY BUBILN
document.getElementById("saveVasikBtn").addEventListener("click", async () => {
    const text = document.getElementById("msgVasikText").value;
    try {
        await updateDoc(doc(db, "mentors", "7002"), { message: text });
        alert("Zpráva pro Vaška (7002) byla úspěšně změněna!");
    } catch (e) { alert("Chyba: " + e.message); }
});

document.getElementById("saveHorryBtn").addEventListener("click", async () => {
    const text = document.getElementById("msgHorryText").value;
    try {
        await updateDoc(doc(db, "mentors", "7067"), { message: text });
        alert("Zpráva pro Honzu (7067) byla úspěšně změněna!");
    } catch (e) { alert("Chyba: " + e.message); }
});
</script>
</body>
</html>
