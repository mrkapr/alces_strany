document.getElementById("btnGoogleImport").addEventListener("click", async () => {
    const statusDiv = document.getElementById("status");
    statusDiv.style.display = "block";
    statusDiv.innerHTML = "Otevírám Google přihlášení...<br>";

    try {
        const result = await signInWithPopup(auth, provider);
        statusDiv.innerHTML += `<span style='color:#00ff66;'>✓ Přihlášen: ${result.user.email}</span><br>`;
        statusDiv.innerHTML += "Nahrávám...<br><br>";

        let celkovyPocet = 0;

        for (const [oc, hodnoty] of Object.entries(excelData)) {
            const realnyEmail = emailMap[oc] || "";

            for (let i = 0; i < mesice.length; i++) {
                const mesicStr = mesice[i];
                let hodnota = hodnoty[i];
                
                // jakýkoliv případný zbytek textu odfiltrujeme na pomlčku
                if (!hodnota || hodnota.includes("posun") || hodnota.includes("opraveno")) {
                    hodnota = "-";
                }

                const docId = `${oc}_${mesicStr}`;

                let importObject = {
                    oc: oc,
                    osobniCislo: oc,
                    userEmail: realnyEmail,
                    archiveMonth: mesicStr,
                    dateText: `01. ${parseInt(mesicStr.split("-")[1])}. ${mesicStr.split("-")[0]}`,
                    evc: "IMPORT",
                    rz: "IMPORT",
                    archivedAt: new Date().toISOString()
                };

                if (hodnota !== "-" && hodnota !== "/" && hodnota !== "X" && hodnota !== "!" && hodnota !== "?") {
                    importObject.najetoKm = parseFloat(hodnota);
                    importObject.statusText = "odjeto";
                } else {
                    importObject.najetoKm = 0;
                    importObject.statusText = hodnota; // Uloží se '-', '/', 'X', '!'
                }

                await setDoc(doc(db, "ridici_archivy", docId), importObject);
                celkovyPocet++;
            }
        }

        statusDiv.innerHTML += `<br><span style='color:#00ff66;'><strong>Import dokončen.</strong><br>Všechny řádky byly přepsány přesně na ${celkovyPocet} políček.</span>`;
        alert("Hotovo! Stará data byla smazána a nahrazena čistým přehledem.");

    } catch (err) {
        statusDiv.innerHTML += `<br><span style='color:#ff4d4d;'>Máš tu chybu mrdko: ${err.message}</span>`;
        alert("Chyba při zápisu: " + err.message);

});
