<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domů | alces, a. s.</title>
<link rel="icon" href="favicon.png" type="image/png">
<!-- Google font Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    body {
    margin: 0;
    font-family: 'Poppins', Arial, sans-serif;

    background-image: 
        url("fotky/gradient.png"),
        url("fotky/foto5.png");

    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    }


    /* horní lišta */
.topbar {
    height: 58px;

    position: fixed;
    top: 16px;
    left: 24px;
    right: 24px;
    z-index: 999;
    overflow: hidden;

    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.18);

    color: white;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 18px;

    border-radius: 24px;

    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);

    box-shadow:
        0 18px 55px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.18);
}

.topbar::after {
    content: "";
    position: absolute;

    width: 90px;
    height: 90px;

    left: var(--mouse-x, 50%);
    top: var(--mouse-y, 50%);

    transform: translate(-50%, -50%);

    background: radial-gradient(
        circle,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.10) 30%,
        transparent 68%
    );

    pointer-events: none;
    opacity: 0;
    filter: blur(8px);

    transition:
        opacity 0.25s ease,
        left 0.002s linear,
        top 0.002s linear;
}

.topbar:hover::after {
    opacity: 1;
}


.menu {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-right: 0;
}

    .divider {
    height: 20px;
    width: 2.5px;
    background: rgb(255, 255, 255);
    margin: 0 3px;
    }

.menu a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: 600;
    display: inline-block;

    transition: 
        transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1),
        opacity 0.25s ease,
        filter 0.25s ease;
}

.menu:hover a {
    opacity: 0.4;
    transform: scale(0.9);
}

.menu a:hover {
    opacity: 1 !important;
    transform: scale(1.08);
    filter: blur(0px);
}

.menu a:active {
    transform: scale(0.9);
}

/* MANAGEMENT - zlatý glow */
.rank-management .menu a:hover {
    text-shadow: 0 0 8px gold, 0 0 16px orange;
}

/* DISPEČER - modrý */
.rank-dispecer .menu a:hover {
    text-shadow: 0 0 8px #00ccff, 0 0 16px #0099ff;
}

/* ŘIDIČ - zelený */
.rank-ridic .menu a:hover {
    text-shadow: 0 0 8px #00ff66, 0 0 16px #00cc55;
}


.logout {
    font-family: 'Poppins', Arial, sans-serif;

    background: rgba(212, 0, 0, 0.55);
    color: white;

    border: 1px solid rgba(255,255,255,0.18);

    padding: 7px 13px;

    cursor: pointer;

    margin-left: 4px;

    border-radius: 999px;

    display: inline-block;

    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.16),
        0 8px 24px rgba(0,0,0,0.18);

    transition: 
        transform 0.18s ease,
        opacity 0.18s ease,
        background 0.18s ease;
}

.logout:hover {
    transform: scale(0.94);
    opacity: 0.95;
    background: rgba(190,0,0,0.7);
}

.logout:active {
    transform: scale(0.88);
}

    /* obsah */
    .content {
    margin: 130px 60px 60px 60px;
    color: white;
    }

.welcome {
    font-size: 50px;
    font-weight: 700;
    line-height: 1.05;
    text-shadow: 0 6px 30px rgba(0,0,0,0.35);
}

.username {
    margin-top: 6px;
    font-size: 38px;
    font-weight: 400;
    opacity: 0.95;
}
    .logo {
    display: flex;
    align-items: center;
    }

.logo img {
    height: 34px;
    width: auto;
    display: block;
}

    /* ===== popup ===== */
.popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.popup {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-30px);
    background: #ffd84d;
    color: #000;
    width: 90%;
    max-width: 420px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    z-index: 9999;
    opacity: 0;
    transition: all 0.4s ease;
    font-family: 'Poppins', Arial, sans-serif;
}

.popup.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.popup-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    padding: 14px 16px 8px 16px;
}

.popup-body {
    padding: 0 16px 16px 16px;
    font-size: 14px;
    font-weight: 400;
}

.close-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
}

.hidden {
    display: none;
}

/* ===== overlay ===== */
#recruitment-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;

    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

/* aktivní stav */
#recruitment-overlay.active {
    opacity: 1;
    pointer-events: auto;
}

/* ===== popup ===== */
#recruitment-popup {
    background: #ffd500;
    color: #000;
    width: 90%;
    max-width: 520px;
    padding: 30px 40px;
    border-radius: 16px;
    text-align: center;
    position: relative;

    transform: translateY(-60px);
    opacity: 0;
    transition: all 0.45s ease;
}

/* animace nájezdu do středu */
#recruitment-overlay.active #recruitment-popup {
    transform: translateY(0);
    opacity: 1;
}

#recruitment-popup h2 {
    margin: 0 0 12px 0;
    font-size: 28px;
    font-weight: 700;
}

#recruitment-popup p {
    margin: 0;
    font-size: 16px;
    font-weight: 400;
}

/* křížek */
.close-btn {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    font-weight: 600;
} 

.user-rank {
    margin-top: 14px;
    font-size: 18px;
    opacity: 0.85;
}

.rank-box {
    display: none;
    margin-top: 35px;
    background: rgba(0,0,0,0.45);
    padding: 20px;
    border-radius: 18px;
    max-width: 520px;
}

.rank-box h2 {
    margin-top: 0;
}

.rank-ridic,
.rank-zaslouzily-ridic,
.rank-team-manager,
.rank-dispecer,
.rank-provozni-reditel,
.rank-management,
.rank-majitel {
    display: none;
}

[class^="rank-"] {
    display: none;
}

.menu a.rank-ridic,
.menu a.rank-zaslouzily-ridic,
.menu a.rank-team-manager,
.menu a.rank-dispecer,
.menu a.rank-provozni-reditel,
.menu a.rank-management,
.menu a.rank-majitel {
    display: none;
}

.menu a[data-min-rank],
.menu span[data-min-rank] {
    display: none;
}

/* ===== MOBILNÍ ZOBRAZENÍ ===== */

.mobile-menu-btn {
    display: none;
}

@media (max-width: 900px) {

    body {
        background-position: center top;
        min-height: 100vh;
    }

    .topbar {
        top: 10px;
        left: 10px;
        right: 10px;

        height: 58px;
        padding: 0 14px;

        border-radius: 22px;

        overflow: visible;
    }

    .topbar::after {
        display: none;
    }

    .logo img {
        height: 30px;
    }

    .mobile-menu-btn {
        display: block;

        background: rgba(255,255,255,0.10);
        color: white;

        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 16px;

        padding: 8px 12px;

        font-size: 22px;
        line-height: 1;

        cursor: pointer;

        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
    }

    .menu {
        position: absolute;
        top: 68px;
        left: 0;
        right: 0;

        display: none;

        flex-direction: column;
        align-items: stretch;
        gap: 8px;

        margin: 0;
        padding: 14px;

        background: rgba(20, 20, 20, 0.78);
        border: 1px solid rgba(255,255,255,0.22);

        border-radius: 24px;

        backdrop-filter: blur(28px) saturate(140%);
        -webkit-backdrop-filter: blur(28px) saturate(140%);

        box-shadow:
            0 18px 55px rgba(0,0,0,0.28),
            inset 0 1px 0 rgba(255,255,255,0.16);
    }

    .menu.open {
        display: flex;
    }

    .menu:hover a {
        opacity: 1;
        transform: none;
    }

    .menu a {
        margin-left: 0;

        width: 100%;

        padding: 10px 12px;

        border-radius: 14px;

        font-size: 14px;
    }

    .menu a:hover {
        transform: scale(0.98);
        background: rgba(255,255,255,0.10);
    }

    .divider {
        display: none;
    }

    .logout {
        width: 100%;
        margin-left: 0;
        margin-top: 6px;

        padding: 10px 12px;
        text-align: center;
    }

    .content {
        margin: 115px 22px 40px 22px;
    }

    .welcome {
        font-size: 42px;
    }

    .username {
        font-size: 30px;
    }

    .user-rank {
        font-size: 16px;
    }
}

@media (max-width: 420px) {

    .content {
        margin: 110px 18px 35px 18px;
    }

    .welcome {
        font-size: 36px;
    }

    .username {
        font-size: 26px;
    }
}

</style>
</head>

<body>

<div class="content">
    <div class="welcome">Vítej,</div>
    <div class="username" id="name"></div>
    <div class="user-rank" id="rank"></div>

    <!-- <div class="rank-box rank-zaslouzily-ridic">
        <h2>Ježdění 30.5.2026</h2>
        <p>Vážení  řidiči, nahoře v liště se můžete předběžně přihlásit na ježdění, které se bude konat 30. 5. 2026. Budeme zajišťovat smluvní linky k výročí 27. narozenin rádia Blaník v Benešově.</p>

<script>
const username = localStorage.getItem("username");
const rank = localStorage.getItem("rank");
const rankName = localStorage.getItem("rankName");

if (!username || !rank || !rankName) {
    window.location.href = "login.html";
} else {
    document.getElementById("name").innerText = username;
    document.getElementById("rank").innerText = rankName;

    showRankContent(rank);
    showRankMenu(rank);
}

function showRankContent(rank) {
    const allRankElements = document.querySelectorAll(
        ".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer, .rank-provozni-reditel, .rank-management, .rank-majitel"
    );

    allRankElements.forEach(element => {
        element.style.display = "none";
    });

    if (rank === "ridic") {
        document.querySelectorAll(".rank-ridic").forEach(element => {
            element.style.display = "inline-block";
        });
    }

    if (rank === "zasloužily-ridic") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic").forEach(element => {
            element.style.display = "inline-block";
        });
    }

    if (rank === "team-manager") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager").forEach(element => {
            element.style.display = "inline-block";
        });
    }

    if (rank === "dispecer") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer").forEach(element => {
            element.style.display = "inline-block";
        });
    }

    if (rank === "provozni-reditel") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer, .rank-provozni-reditel").forEach(element => {
            element.style.display = "inline-block";
        });
    }

    if (rank === "management") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer, .rank-provozni-reditel, .rank-management").forEach(element => {
            element.style.display = "inline-block";
        });
    }

    if (rank === "majitel") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer, .rank-provozni-reditel, .rank-management, .rank-majitel").forEach(element => {
            element.style.display = "inline-block";
        });
    }
}

function showRankMenu(rank) {
    const rankLevels = {
        "ridic": 1,
        "zasloužily-ridic": 2,
        "team-manager": 3,
        "dispecer": 4,
        "provozni-reditel": 5,
        "management": 6,
        "majitel": 7
    };

    document.querySelectorAll("[data-min-rank]").forEach(element => {
        const minRank = element.dataset.minRank;

        if (rankLevels[rank] >= rankLevels[minRank]) {
            element.style.display = "inline-block";
        } else {
            element.style.display = "none";
        }
    });
}

function logout() {
    localStorage.removeItem("username");
    localStorage.removeItem("rank");
    localStorage.removeItem("rankName");
    window.location.href = "index.html";
}

const topbar = document.querySelector(".topbar");

topbar.addEventListener("mousemove", (e) => {

    const rect = topbar.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    topbar.style.setProperty("--mouse-x", `${x}px`);
    topbar.style.setProperty("--mouse-y", `${y}px`);
});

function toggleMobileMenu() {
    document.querySelector(".menu").classList.toggle("open");
}

</script>
