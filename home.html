    /* horní lišta */
.topbar {
    height: 58px;

    position: fixed;
    top: 16px;
    left: 24px;
    right: 24px;
    z-index: 999;
    overflow: hidden;

    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.18);

    color: white;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 18px;

    border-radius: 24px;

    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);

    box-shadow:
        0 18px 55px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.18);
}

.topbar::after {
    content: "";
    position: absolute;

    width: 90px;
    height: 90px;

    left: var(--mouse-x, 50%);
    top: var(--mouse-y, 50%);

    transform: translate(-50%, -50%);

    background: radial-gradient(
        circle,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.10) 30%,
        transparent 68%
    );

    pointer-events: none;
    opacity: 0;
    filter: blur(8px);

    transition:
        opacity 0.25s ease,
        left 0.002s linear,
        top 0.002s linear;
}

.topbar:hover::after {
    opacity: 1;
}


.menu {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-right: 0;
}

    .divider {
    height: 20px;

    margin: 0 3px;
    }

.menu a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: 600;
    display: inline-block;

    transition: 
        transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1),
        opacity 0.25s ease,
        filter 0.25s ease;
}

.menu:hover a {
    opacity: 0.4;
    transform: scale(0.9);
}

.menu a:hover {
    opacity: 1 !important;
    transform: scale(1.08);
    filter: blur(0px);
}

.menu a:active {
    transform: scale(0.9);
}

/* MANAGEMENT - zlatý glow */
.rank-management .menu a:hover {
    text-shadow: 0 0 8px gold, 0 0 16px orange;
}

/* DISPEČER - modrý */

}

/* ŘIDIČ - zelený */

    text-shadow: 0 0 8px #00ff66, 0 0 16px #00cc55;
}

<script>
const username = localStorage.getItem("username");
const rank = localStorage.getItem("rank");
const rankName = localStorage.getItem("rankName");

if (!username || !rank || !rankName) {
    window.location.href = "login.html";
} else {
    document.getElementById("name").innerText = username;
    document.getElementById("rank").innerText = rankName;

    const nameZk = document.getElementById("name-zk");
    const rankZk = document.getElementById("rank-zk");

if(nameZk) nameZk.innerText = username;
if(rankZk) rankZk.innerText = rankName;

    showRankContent(rank);
    showRankMenu(rank);
}

function showRankContent(rank) {
    const allRankElements = document.querySelectorAll(
    ".rank-zkusebni-ridic, .rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer, .rank-provozni-reditel, .rank-management, .rank-majitel"
);

    allRankElements.forEach(element => {
        element.style.display = "none";
    });

if (rank === "zkusebni-ridic") {
    document.querySelectorAll(".rank-zkusebni-ridic").forEach(element => {
        element.style.display = "inline-block";
    });
}

    if (rank === "ridic") {
        document.querySelectorAll(".rank-ridic").forEach(element => {
            element.style.display = "inline-block";
        });
    }

    if (rank === "zasloužily-ridic") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic").forEach(element => {
            element.style.display = "inline-block";
        });
    }

    if (rank === "team-manager") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager").forEach(element => {
            element.style.display = "inline-block";
        });
    }

    if (rank === "dispecer") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer").forEach(element => {
            element.style.display = "inline-block";
        });
    }

    if (rank === "provozni-reditel") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer, .rank-provozni-reditel").forEach(element => {
            element.style.display = "inline-block";
        });
    }

    if (rank === "management") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer, .rank-provozni-reditel, .rank-management").forEach(element => {
            element.style.display = "inline-block";
        });
    }

    if (rank === "majitel") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer, .rank-provozni-reditel, .rank-management, .rank-majitel").forEach(element => {
            element.style.display = "inline-block";
        });
    }
}

function showRankMenu(rank) {
const rankLevels = {
    "zkusebni-ridic": 1,
    "ridic": 2,
    "zasloužily-ridic": 3,
    "team-manager": 4,
    "dispecer": 5,
    "provozni-reditel": 6,
    "management": 7,
    "majitel": 8
};

    document.querySelectorAll("[data-min-rank]").forEach(element => {
        const minRank = element.dataset.minRank;

        if (rankLevels[rank] >= rankLevels[minRank]) {
            element.style.display = "inline-block";
        } else {
            element.style.display = "none";
        }
    });
}

function logout() {
    localStorage.removeItem("username");
    localStorage.removeItem("rank");
    localStorage.removeItem("rankName");
    window.location.href = "index.html";
}

const topbar = document.querySelector(".topbar");

topbar.addEventListener("mousemove", (e) => {

    const rect = topbar.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    topbar.style.setProperty("--mouse-x", `${x}px`);
    topbar.style.setProperty("--mouse-y", `${y}px`);
});

function toggleMobileMenu() {
    document.querySelector(".menu").classList.toggle("open");
}

function toggleSidebar() {
    const sidebar = document.getElementById("rightSidebar");
    const overlay = document.getElementById("sidebarOverlay");
    
    if (sidebar && overlay) {
        sidebar.classList.toggle("open");
        overlay.classList.toggle("open");
    }
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAwRV2OuIhA-oyg295gIv5-4zfzO4qb9MY",
    authDomain: "alces-d505c.firebaseapp.com",
    projectId: "alces-d505c",
    storageBucket: "alces-d505c.firebasestorage.app",
    messagingSenderId: "318520073072",
    appId: "1:318520073072:web:53ab5c0033f60e96bbcdb5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userEmail = "";
const mentorId = localStorage.getItem("mentorId");

// HLÍDAČ PŘIHLÁŠENÍ — Jediné bezpečné místo, odkud se spouští načítání dat
onAuthStateChanged(auth, async (user) => {
    if (user) {
        console.log("Firebase Auth: Uživatel je bezpečně ověřen.");
        userEmail = user.email; 
        
        // Data načteme AŽ TEĎ, kdy máme 100% jistotu ověřeného uživatele
        await loadMentor();
        await loadAnnouncements();

        // KONTROLA RANKU: Zviditelníme tlačítko menu pouze pro vedení
        const allowedManagementRanks = ["team-manager", "dispecer", "provozni-reditel", "management", "majitel"];
        const userRankForMenu = localStorage.getItem("rank") || "";

        if (allowedManagementRanks.includes(userRankForMenu)) {
            const toggleBtn = document.getElementById("menuToggleBtn");
            if (toggleBtn) toggleBtn.style.display = "inline-block";
        }
    } else {
        console.log("Uživatel není přihlášen přes Firebase Auth.");
    }
});

async function loadMentor() {
    if (mentorId) {
        try {
            const docRef = doc(db, "mentors", String(mentorId).trim());
            const mentorSnap = await getDoc(docRef);

            if (mentorSnap.exists()) {
                const mentor = mentorSnap.data();
                if (document.getElementById("mentorName")) document.getElementById("mentorName").innerText = mentor.name || "Jméno se nepodařilo načíst.";
                if (document.getElementById("mentorRole")) document.getElementById("mentorRole").innerText = mentor.role || "Mentor";
                if (document.getElementById("mentorAvatar") && mentor.avatar) document.getElementById("mentorAvatar").src = mentor.avatar;
                if (document.getElementById("mentorMessage")) document.getElementById("mentorMessage").innerText = mentor.message || "Zpráva nebyla načtena.";
                if (document.getElementById("mentorRoom")) document.getElementById("mentorRoom").innerText = mentor.room ? `Přidělená místnost: ${mentor.room}` : "";
                
                const mentorSection = document.querySelector(".mentor-section");
                if (mentorSection) mentorSection.style.display = "flex";
            }
        } catch (error) {
            console.error("Chyba při načítání mentora:", error);
        }
    }
}

async function loadAnnouncements() {
    const listContainer = document.getElementById("announcementsList");
    if (!listContainer) return;
    
    // VYČIŠTĚNÍ: Smaže minulé pokusy o vykreslení, aby nevznikaly duplicity
    listContainer.innerHTML = "";

    try {
        const querySnapshot = await getDocs(collection(db, "announcements"));
        let count = 0;

        const docsArray = [];
        querySnapshot.forEach(d => docsArray.push({ id: d.id, data: d.data() }));
        
        // Seřazení podle času vytvoření
        docsArray.sort((a, b) => (b.data.createdAt?.seconds || 0) - (a.data.createdAt?.seconds || 0));

        docsArray.forEach((annDoc) => {
            const annId = annDoc.id;
            const annData = annDoc.data;

            // Filtrování podle rolí
            const currentRank = localStorage.getItem("rank") || ""; 
            const targetRanks = annData.targetRanks || []; 

            if (targetRanks.length > 0 && !targetRanks.includes(currentRank)) {
                return; // Přeskočíme oznámení, pokud na něj řidič nemá rank
            }

            // Pokud prošlo filtrem, započítáme ho
            count++;

            const div = document.createElement("div");
            div.className = "announcement";

            const confirmedByArray = annData.confirmedBy || [];
            const isConfirmed = userEmail ? confirmedByArray.includes(userEmail) : false;

            let dateString = "";
            if (annData.createdAt) {
                const d = annData.createdAt.toDate();
                dateString = d.toLocaleDateString("cs-CZ") + " v " + d.toLocaleTimeString("cs-CZ", {hour: '2-digit', minute:'2-digit'});
            }

            div.innerHTML = `
                <h3>${annData.title || "Bez nadpisu"}</h3>
                <div class="announcement-meta" style="font-size: 12px; opacity: 0.6; margin-bottom: 10px;">
                    ${dateString ? `<span>📅 ${dateString}</span>` : ""}
                    <span style="margin-left: 15px;">✍️ Publikoval: <strong>${annData.author || "Vedení firmy"}</strong></span>
                </div>
                <p>${annData.text || ""}</p>
                <div class="announcement-footer"></div>
            `;

            const footer = div.querySelector(".announcement-footer");

            if (isConfirmed) {
                footer.innerHTML = `<span class="confirmed-badge">✓ Přečteno a potvrzeno</span>`;
            } else {
                const btn = document.createElement("button");
                btn.className = "confirm-btn";
                btn.innerText = "Potvrdit přečtení";
                
                btn.addEventListener("click", async () => {
                    if (!userEmail) {
                        alert("Chyba: Systém tě nerozpoznal (chybí uživatelský email). Zkus se přihlásit znovu.");
                        return;
                    }
                    try {
                        await updateDoc(doc(db, "announcements", annId), {
                            confirmedBy: arrayUnion(userEmail)
                        });
                        await loadAnnouncements();
                    } catch (err) {
                        console.error(err);
                        alert("Nepodařilo se potvrdit: " + err.message);
                    }
                });
                footer.appendChild(btn);
            }

            listContainer.appendChild(div);
        });

        if (count === 0) {
            listContainer.innerHTML = `<p style="opacity: 0.5; padding: 10px; margin:0;">Momentálně nejsou publikována žádná oznámení.</p>`;
        }

    } catch (error) {
        console.error("Chyba při načítání oznámení:", error);
        listContainer.innerHTML = `<p style="color: #ff4d4d; padding: 10px; margin:0;">Chyba při stahování oznámení.</p>`;
    }
}
</script>
