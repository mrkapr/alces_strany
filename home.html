<style>
    body {
    margin: 0;
    font-family: 'Poppins', Arial, sans-serif;

    background-image: 
        url("fotky/gradient.png"),
        url("fotky/foto5.png");

    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    }


    /* horní lišta */
    .topbar {
    height: 50px;
    background: #555;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 20px;
    }


    .menu {
    display: flex;
    align-items: center;
    gap: 25px; /* rozestupy mezi položkami */
    margin-right: 20px; /* posune celé menu doleva */
    }

    .divider {
    height: 20px;
    width: 2.5px;
    background: rgb(255, 255, 255);
    margin: 0 3px;
    }

    .menu a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: 600;
    }


    .logout {
        font-family: 'Poppins', Arial, sans-serif;
        background: darkred;
        color: white;
        border: none;
        padding: 6px 10px;
        cursor: pointer;
        margin-left: 20px;
        border-radius: 20px;
    }

    /* obsah */
    .content {
    margin: 60px;
    color: white;
    }

    .welcome {
    font-size: 48px;
    font-weight: 600;
    }

    .username {
    font-size: 36px;
    font-weight: 400;
    }

    .logo {
    display: flex;
    align-items: center;
    }

    .logo img {
    height: 30px;
    width: auto;
    display: block;
    }

    /* ===== popup ===== */
.popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.popup {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-30px);
    background: #ffd84d;
    color: #000;
    width: 90%;
    max-width: 420px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    z-index: 9999;
    opacity: 0;
    transition: all 0.4s ease;
    font-family: 'Poppins', Arial, sans-serif;
}

.popup.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.popup-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    padding: 14px 16px 8px 16px;
}

.popup-body {
    padding: 0 16px 16px 16px;
    font-size: 14px;
    font-weight: 400;
}

.close-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
}

.hidden {
    display: none;
}

/* ===== overlay ===== */
#recruitment-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;

    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

/* aktivní stav */
#recruitment-overlay.active {
    opacity: 1;
    pointer-events: auto;
}

/* ===== popup ===== */
#recruitment-popup {
    background: #ffd500;
    color: #000;
    width: 90%;
    max-width: 520px;
    padding: 30px 40px;
    border-radius: 16px;
    text-align: center;
    position: relative;

    transform: translateY(-60px);
    opacity: 0;
    transition: all 0.45s ease;
}

/* animace nájezdu do středu */
#recruitment-overlay.active #recruitment-popup {
    transform: translateY(0);
    opacity: 1;
}

#recruitment-popup h2 {
    margin: 0 0 12px 0;
    font-size: 28px;
    font-weight: 700;
}

#recruitment-popup p {
    margin: 0;
    font-size: 16px;
    font-weight: 400;
}

/* křížek */
.close-btn {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    font-weight: 600;
} 

.user-rank {
    margin-top: 10px;
    font-size: 20px;
    opacity: 0.9;
}

.rank-box {
    display: none;
    margin-top: 35px;
    background: rgba(0,0,0,0.45);
    padding: 20px;
    border-radius: 18px;
    max-width: 520px;
}

.rank-box h2 {
    margin-top: 0;
}

.rank-ridic,
.rank-zaslouzily-ridic,
.rank-team-manager,
.rank-dispecer,
.rank-provozni-reditel,
.rank-management,
.rank-majitel {
    display: none;
}

</style>
</head>

<script>
const username = localStorage.getItem("username");
const rank = localStorage.getItem("rank");
const rankName = localStorage.getItem("rankName");

if (!username || !rank || !rankName) {
    window.location.href = "login.html";
} else {
    document.getElementById("name").innerText = username;
    document.getElementById("rank").innerText = rankName;

    showRankContent(rank);
}

function showRankContent(rank) {
    const allRankElements = document.querySelectorAll(
        ".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer, .rank-provozni-reditel, .rank-management, .rank-majitel"
    );

    allRankElements.forEach(element => {
        element.style.display = "none";
    });

    if (rank === "ridic") {
        document.querySelectorAll(".rank-ridic").forEach(element => {
            element.style.display = "block";
        });
    }

    if (rank === "zasloužily-ridic") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic").forEach(element => {
            element.style.display = "block";
        });
    }

    if (rank === "team-manager") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager").forEach(element => {
            element.style.display = "block";
        });
    }

    if (rank === "dispecer") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer").forEach(element => {
            element.style.display = "block";
        });
    }

    if (rank === "provozni-reditel") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer, .rank-provozni-reditel").forEach(element => {
            element.style.display = "block";
        });
    }

    if (rank === "management") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer, .rank-provozni-reditel, .rank-management").forEach(element => {
            element.style.display = "block";
        });
    }

    if (rank === "majitel") {
        document.querySelectorAll(".rank-ridic, .rank-zaslouzily-ridic, .rank-team-manager, .rank-dispecer, .rank-provozni-reditel, .rank-management, .rank-majitel").forEach(element => {
            element.style.display = "block";
        });
    }
}

function logout() {
    localStorage.removeItem("username");
    localStorage.removeItem("rank");
    localStorage.removeItem("rankName");
    window.location.href = "index.html";
}
</script>
