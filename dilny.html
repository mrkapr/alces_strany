<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technické zázemí | alces, a. s.</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; font-family: 'Poppins', Arial, sans-serif; background: #121212; min-height: 100vh; color: white; }
        .topbar {
            height: 58px; position: fixed; top: 16px; left: 24px; right: 24px; z-index: 999;
            background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.18);
            display: flex; align-items: center; justify-content: space-between; padding: 0 18px; border-radius: 24px;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); box-shadow: 0 18px 55px rgba(0,0,0,0.28);
        }
        .topbar a { color: white; text-decoration: none; font-weight: 600; margin-left: 20px; }
        .topbar a:hover { color: #ffd84d; }
        .content { margin: 120px 40px 40px 40px; }
        h1 { font-size: 36px; font-weight: 700; margin-bottom: 20px; text-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        
        .layout-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; align-items: start; }
        @media (max-width: 1000px) { .layout-grid { grid-template-columns: 1fr; } }
        
        .panel {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
            padding: 24px; border-radius: 24px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); margin-bottom: 25px;
        }
        .panel h2 { margin-top: 0; font-size: 20px; color: #ffd84d; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        /* Vozidla vpravo */
        .search-box { width: 100%; margin-bottom: 15px; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: white; font-family: inherit; box-sizing: border-box; }
        .search-box:focus { outline: none; border-color: #ffd84d; }
        .vehicle-list { list-style: none; padding: 0; margin: 0; max-height: 600px; overflow-y: auto; }
        .vehicle-item { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            padding: 14px 18px; border-radius: 14px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
        }
        .vehicle-item:hover { background: rgba(255,216,77,0.1); border-color: rgba(255,216,77,0.3); }
        .vehicle-header { display: flex; justify-content: space-between; align-items: center; }
        .vehicle-evc { font-weight: 700; color: #ffd84d; font-size: 16px; }
        .vehicle-date { font-size: 11px; opacity: 0.4; }
        .vehicle-details { display: none; margin-top: 10px; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 8px; opacity: 0.85; white-space: pre-wrap; }
        
        /* Historie vlevo */
        .log-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); padding: 18px; border-radius: 16px; margin-bottom: 15px; }
        .log-title { font-weight: 700; margin: 0 0 5px 0; font-size: 18px; color: #fff; }
        .log-meta { font-size: 11px; opacity: 0.4; margin-bottom: 10px; }

        /* Menu vpravo vysouvací */
        .sidebar-right {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100vh;
            background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-left: 1px solid rgba(255, 255, 255, 0.1); padding: 24px 16px; box-sizing: border-box;
            z-index: 99999; transition: right 0.3s ease-in-out;
        }
        .sidebar-right.open { right: 0; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.6); z-index: 99998; }
        .sidebar-overlay.open { display: block; }
        .sidebar-right button { background: none; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="topbar">
    <div style="font-weight:700; font-size:18px;">alces, a. s. — Technické zázemí</div>
    <div>
        <a href="home.html">Domů</a>
        <a href="#" onclick="toggleSidebar(); return false;" id="menuToggleBtn" style="display: none; color: #ffd84d;">☰ Správa</a>
    </div>
</div>

<div id="rightSidebar" class="sidebar-right">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
      <span style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #ffd84d; font-weight: 700;">Správa dílen</span>
      <button type="button" style="font-size:20px; opacity:0.5;" onclick="toggleSidebar()">✕</button>
    </div>
    <a href="dilny-sprava.html" style="display:block; color:white; text-decoration:none; padding:12px; border-radius:8px; background: rgba(255,255,255,0.05); font-weight: 600;">🛠️ Administrace dílen</a>
</div>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="content">
    <h1>Záznamy z dílen a stav vozů</h1>
    
    <div class="layout-grid">
        <div>
            <div class="panel">
                <h2>Historie oznámení z dílen</h2>
                <div id="workshopLogsContainer">
                    <p style="opacity:0.5;">Načítám historii hlášení...</p>
                </div>
            </div>
        </div>

        <div class="panel" style="position: sticky; top: 100px;">
            <h2>Stav vozového parku (Ev.č.)</h2>
            <input type="text" id="vehicleSearch" class="search-box" placeholder="🔍 Hledat evidenční číslo..." oninput="filterVehicles()">
            <div class="vehicle-list" id="vehiclesContainer">
                <p style="opacity:0.5;">Načítám evidenci vozů...</p>
            </div>
        </div>
    </div>
</div>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById("rightSidebar");
    const overlay = document.getElementById("sidebarOverlay");
    if (sidebar && overlay) {
        sidebar.classList.toggle("open");
        overlay.classList.toggle("open");
    }
}

function filterVehicles() {
    const query = document.getElementById("vehicleSearch").value.toLowerCase().trim();
    const items = document.querySelectorAll(".vehicle-item");
    items.forEach(item => {
        const evc = item.getAttribute("data-evc").toLowerCase();
        item.style.display = evc.includes(query) ? "block" : "none";
    });
}

function toggleVehicleDetails(element) {
    const details = element.querySelector(".vehicle-details");
    if (details) {
        details.style.display = details.style.display === "block" ? "none" : "block";
    }
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAwRV2OuIhA-oyg295gIv5-4zfzO4qb9MY",
    authDomain: "alces-d505c.firebaseapp.com",
    projectId: "alces-d505c",
    storageBucket: "alces-d505c.firebasestorage.app",
    messagingSenderId: "318520073072",
    appId: "1:318520073072:web:53ab5c0033f60e96bbcdb5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async (user) => {
    if (user) {
        await loadWorkshopLogs();
        await loadVehiclesPark();

        // Odemknutí správy pro vedení
        const allowedManagementRanks = ["team-manager", "dispecer", "provozni-reditel", "management", "majitel"];
        const userRankForMenu = localStorage.getItem("rank") || "";
        if (allowedManagementRanks.includes(userRankForMenu)) {
            const toggleBtn = document.getElementById("menuToggleBtn");
            if (toggleBtn) toggleBtn.style.display = "inline-block";
        }
    } else {
        window.location.href = "login.html";
    }
});

async function loadWorkshopLogs() {
    const container = document.getElementById("workshopLogsContainer");
    if (!container) return;
    container.innerHTML = "";

    try {
        const querySnapshot = await getDocs(collection(db, "workshop_logs"));
        const logs = [];
        querySnapshot.forEach(d => logs.push(d.data()));
        logs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        if (logs.length === 0) {
            container.innerHTML = `<p style="opacity:0.5; margin:0;">Zatím nebyly zapsány žádné zprávy z dílen.</p>`;
            return;
        }

        logs.forEach(log => {
            const date = log.createdAt ? new Date(log.createdAt.toDate()).toLocaleDateString("cs-CZ") + " v " + new Date(log.createdAt.toDate()).toLocaleTimeString("cs-CZ", {hour:'2-digit', minute:'2-digit'}) : "Neznámý čas";
            container.innerHTML += `
                <div class="log-item">
                    <div class="log-title">${log.title}</div>
                    <div class="log-meta">📅 ${date} | Vytvořil: ${log.author}</div>
                    <div style="font-size:14px; opacity:0.9; white-space:pre-wrap;">${log.text}</div>
                </div>
            `;
        });
    } catch (err) { console.error(err); }
}

async function loadVehiclesPark() {
    const container = document.getElementById("vehiclesContainer");
    if (!container) return;
    container.innerHTML = "";

    try {
        const querySnapshot = await getDocs(collection(db, "vehicles"));
        const vehicles = [];
        querySnapshot.forEach(d => vehicles.push({ id: d.id, data: d.data() }));
        vehicles.sort((a, b) => a.id.localeCompare(b.id, undefined, { numeric: true }));

        if (vehicles.length === 0) {
            container.innerHTML = `<p style="opacity:0.5; margin:0;">V systému nejsou registrovaná žádná vozidla.</p>`;
            return;
        }

        vehicles.forEach(v => {
            const date = v.data.updatedAt ? new Date(v.data.updatedAt.toDate()).toLocaleDateString("cs-CZ") : "Nikdy";
            container.innerHTML += `
                <div class="vehicle-item" data-evc="${v.id}" onclick="toggleVehicleDetails(this)">
                    <div class="vehicle-header">
                        <span class="vehicle-evc">🚍 Ev.č. ${v.id}</span>
                        <span class="vehicle-date">Aktualizace: ${date}</span>
                    </div>
                    <div class="vehicle-details"><strong>Poslední stav / záznam:</strong>\n${v.data.lastStatus || "Žádné záznamy."}</div>
                </div>
            `;
        });
    } catch (err) { console.error(err); }
}
</script>
</body>
</html>
